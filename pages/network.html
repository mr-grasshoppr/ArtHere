        /* ---- TOP BAR ---- */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid #1a1a1a; z-index: 200;
            display: flex; align-items: center; padding: 0 18px; gap: 12px;
        }
        .nav-logo { display: block; height: 26px; width: auto; transition: opacity 0.2s; }
        .nav-logo:hover { opacity: 0.7; }
        .pancake-wrap { position: relative; }
        .pancake-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; flex-direction: column; gap: 5px; }
        .pancake-btn span { display: block; width: 20px; height: 1.5px; background: rgba(255,255,255,0.8); transition: all 0.25s; }
        .pancake-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
        .pancake-btn.open span:nth-child(2) { opacity: 0; }
        .pancake-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
        .pancake-dropdown { display: none; position: absolute; top: calc(100% + 8px); left: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; overflow: hidden; min-width: 160px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 300; }
        .pancake-dropdown.open { display: block; }
        .pancake-dropdown a { display: block; padding: 13px 20px; font-size: 0.9rem; color: #ccc; text-decoration: none; border-bottom: 1px solid #222; transition: background 0.15s; }
        .pancake-dropdown a:last-child { border-bottom: none; }
        .pancake-dropdown a:hover { background: #222; color: #fff; }
        .pancake-dropdown a.join { font-weight: 600; color: #fff; }
        .nav-city { font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif; font-size: 0.95rem; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 0.03em; transition: opacity 0.2s; }
        .nav-city:hover { opacity: 0.6; }

        /* ---- FILTER BAR ---- */
        .filter-bar {
            position: fixed; top: 56px; left: 0; right: 0;
            z-index: 100; padding: 10px 14px;
            display: flex; gap: 8px; align-items: center;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
            border-bottom: 1px solid #1a1a1a;
        }
        .filter-wrap { position: relative; }
        .filter-btn {
            padding: 5px 13px; border: 0.5px solid #444; border-radius: 20px;
            background: transparent; font-size: 0.78rem; color: #888; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: all 0.2s; white-space: nowrap;
        }
        .filter-btn:hover { border-color: #888; color: #ccc; }
        .filter-btn.active { background: #fff; border-color: #fff; color: #000; }

        /* ---- DROPDOWNS ---- */
        .filter-dropdown {
            display: none; position: absolute; top: calc(100% + 6px); left: 0;
            background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
            overflow: hidden; min-width: 170px; z-index: 400;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        .filter-dropdown.open { display: block; }
        .filter-dropdown button {
            display: block; width: 100%; padding: 10px 16px; text-align: left;
            background: none; border: none; border-bottom: 1px solid #222;
            color: #888; font-size: 0.82rem; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: background 0.15s, color 0.15s;
            letter-spacing: 0.02em;
        }
        .filter-dropdown button:last-child { border-bottom: none; }
        .filter-dropdown button:hover { background: #222; color: #fff; }
        .filter-dropdown button.chosen { color: #fff; }

        /* ---- GRAPH ---- */
        #graph-container {
            position: fixed;
            top: 56px; /* adjusted by JS for filter bar height */
            left: 0; right: 0; bottom: 56px;
            overflow: hidden; touch-action: none;
        }
        #graph-container svg { width: 100%; height: 100%; display: block; }

        .node-label {
            font-size: 11px; fill: #ddd;
            pointer-events: none; font-family: 'Inter', sans-serif;
        }
        .node-label.artist-label { fill: #e8e8e8; opacity: 0.9; }
        .node-label.place-label  { fill: #e8e8e8; opacity: 0.9; }

        /* ---- HOVER CARD ---- */
        .hover-card {
            position: fixed; z-index: 500;
            background: #111; border: 1px solid #222; border-radius: 8px;
            overflow: hidden; width: 240px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            pointer-events: none; opacity: 0; transition: opacity 0.15s;
        }
        .hover-card.visible { opacity: 1; }
        .hc-artist { display: flex; align-items: center; gap: 12px; padding: 14px; }
        .hc-artist-photo { width: 52px; height: 52px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #222; }
        .hc-artist-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
        .hc-name { font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 700; color: #fff; margin-bottom: 3px; }
        .hc-meta { font-size: 0.72rem; color: #888; line-height: 1.4; }
        .hc-place { display: flex; align-items: stretch; }
        .hc-place-img { width: 90px; flex-shrink: 0; overflow: hidden; background: #222; }
        .hc-place-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .hc-place-text { padding: 14px 12px; }
        .hc-simple { padding: 14px; }

        /* ---- LEGEND / TOGGLES ---- */
        .legend {
            position: fixed; bottom: 68px; left: 18px; right: 18px;
            display: flex; gap: 18px; z-index: 100; align-items: center; flex-wrap: wrap;
        }
        /* Toggle button */
        .legend-toggle {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-size: 0.75rem; color: #bbb;
            user-select: none; transition: color 0.2s;
        }
        .legend-toggle:hover { color: #fff; }
        .legend-toggle.off { color: #555; }
        /* Outer ring + inner dot */
        .toggle-icon {
            position: relative; width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .toggle-ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.22);
            transition: border-color 0.2s;
        }
        .legend-toggle.off .toggle-ring { border-color: rgba(255,255,255,0.08); }
        .toggle-dot {
            width: 12px; height: 12px; border-radius: 50%;
            transition: background 0.2s;
        }
        .legend-suggest { font-size: 0.75rem; color: #999; text-decoration: none; transition: color 0.2s; font-style: italic; margin-left: auto; }
        .legend-suggest:hover { color: #fff; }

        /* ---- BOTTOM BAR ---- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(8px);
            border-top: 1px solid #111; z-index: 100;
            display: flex; align-items: center; padding: 0 18px; gap: 0;
        }
        .bottom-bar-city { text-decoration: none; font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif; font-size: 0.95rem; font-weight: 700; color: #fff; letter-spacing: 0.03em; flex-shrink: 0; }
        .bottom-bar-divider { color: #444; margin: 0 14px; flex-shrink: 0; }
        .bottom-bar-links { display: flex; gap: 24px; align-items: center; }
        .bottom-bar-links a { color: rgba(255,255,255,0.45); text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.03em; transition: color 0.2s; padding: 4px 0; border-bottom: 1.5px solid transparent; }
        .bottom-bar-links a:hover { color: #fff; }
        .bottom-bar-links a.active { color: #fff; border-color: rgba(255,255,255,0.6); }

        @media (max-width: 600px) {
            .bottom-bar-city, .bottom-bar-divider { display: none; }
            .bottom-bar { justify-content: center; }
            .bottom-bar-links { gap: 20px; }

        .pancake-dropdown .cities-trigger {

            width: 100%; text-align: left; font-family: 'Inter', -apple-system, sans-serif;

        .pancake-dropdown .cities-trigger:hover { background: #222; color: #fff; }
        .pancake-dropdown .cities-arrow { font-size: 0.65rem; color: #555; transition: transform 0.2s; }
        .pancake-dropdown .cities-trigger.open .cities-arrow { transform: rotate(90deg); }
        .cities-submenu { display: none; background: #111; border-bottom: 1px solid #222; }

        .cities-submenu a { color: #ccc; }
        .cities-submenu span { color: #333; cursor: default; }
        .cities-submenu a:hover { background: #1a1a1a; color: #fff; }
    </style>
</head>

    reposition();
    window.addEventListener('resize', reposition);

    const svg = d3.select('#network');
    let W, H;

    function getDims() {
        W = container.clientWidth;
        H = container.clientHeight;
    }
    getDims();

    const zoomG = svg.append('g');
    const zoom = d3.zoom().scaleExtent([0.3, 4]).on('zoom', e => zoomG.attr('transform', e.transform));
    svg.call(zoom);
    svg.on('dblclick.zoom', () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity));

    // ── RENDER ────────────────────────────────────────────────────────────────
    let linkSel, nodeSel, sim;

    function getVisible() {
        let nodes = allNodes.filter(n => {
            if (n.type === 'artist' && !showArtists) return false;
            if (n.type === 'place'  && !showPlaces)  return false;
            if (activeMedium && n.type === 'artist' && n.medium !== activeMedium) return false;
            if (activeNeighborhood) {
                if (activeNeighborhood === 'Portland') {
                    if (!n.neighborhood || n.neighborhood === 'Vancouver, WA') return false;
                } else {
                    if (n.neighborhood !== activeNeighborhood) return false;
                }
            }
            return true;
        });
        const nodeIds = new Set(nodes.map(n => n.id));
        const links = allLinks.filter(l =>
            nodeIds.has(l.source.id || l.source) && nodeIds.has(l.target.id || l.target)
        );
        return { nodes, links };
    }

    function nodeRadius(d) {
        const deg = allLinks.filter(l =>
            l.source === d.id || l.target === d.id ||
            l.source.id === d.id || l.target.id === d.id
        ).length;
        return d.type === 'artist' ? 10 + deg * 1.5 : 7 + deg * 1.2;
    }

    const colors = { artist: '#00e5ff', place: '#ff00aa' };

    function render() {
        zoomG.selectAll('*').remove();
        getDims();

        const { nodes, links } = getVisible();
        const simNodes = nodes.map(n => Object.assign({}, n));
        const idMap = {};
        simNodes.forEach(n => idMap[n.id] = n);
        const simLinks = links.map(l => ({
            source: idMap[l.source.id || l.source],
            target: idMap[l.target.id || l.target],
        })).filter(l => l.source && l.target);

        if (sim) sim.stop();
        sim = d3.forceSimulation(simNodes)
            .force('link', d3.forceLink(simLinks).id(d => d.id).distance(d =>
                (d.source.type === 'artist' && d.target.type === 'artist') ? 140 : 100
            ).strength(0.4))
            .force('charge', d3.forceManyBody().strength(-320))
            .force('center', d3.forceCenter(W / 2, H / 2))
            .force('collide', d3.forceCollide().radius(d => nodeRadius(d) + 18));

        linkSel = zoomG.append('g')
            .attr('stroke', '#484848').attr('stroke-opacity', 0.9)
            .selectAll('line').data(simLinks).join('line')
            .attr('stroke-width', 1);

        nodeSel = zoomG.append('g')
            .selectAll('g').data(simNodes).join('g')
            .style('cursor', d => d.url ? 'pointer' : 'default')
            .call(d3.drag()
                .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
                .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
            .on('click', (e, d) => { if (d.url) window.location.href = d.url; })
            .on('mouseover', showCard)
            .on('mousemove', moveCard)
            .on('mouseout',  hideCard)
            .on('touchstart', (e, d) => { e.preventDefault(); showCard(e.touches[0], d); }, { passive: false })
            .on('touchend', hideCard);

        nodeSel.append('circle')
            .attr('r', d => nodeRadius(d))
            .attr('fill', d => colors[d.type] || '#888')
            .attr('stroke', '#0a0a0a').attr('stroke-width', 2)
            .style('opacity', 0)
            .transition().duration(400).delay((d, i) => i * 30)
            .style('opacity', 1);

        nodeSel.append('text')
            .attr('class', d => 'node-label ' + d.type + '-label')
            .attr('dy', d => nodeRadius(d) + 14)
            .attr('text-anchor', 'middle')
            .text(d => d.id)
            .style('opacity', 0)
            .transition().duration(400).delay((d, i) => i * 30 + 100)
            .style('opacity', 1);

        sim.on('tick', () => {
            linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                   .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
            nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        svg.call(zoom.transform, d3.zoomIdentity);
    }

    // ── HOVER CARD ────────────────────────────────────────────────────────────
    const card = document.getElementById('hover-card');

    function showCard(event, d) {
        if (d.type === 'artist') {
            card.innerHTML = `<div class="hc-artist">
                <div class="hc-artist-photo"><img src="${d.photo}" alt="${d.id}" onerror="this.style.display='none'"></div>
                <div class="hc-artist-text">
                    <div class="hc-name">${d.id}</div>
                    <div class="hc-meta">${d.medium}<br>${d.neighborhood}</div>
                </div>
            </div>`;
        } else if (d.image) {
            card.innerHTML = `<div class="hc-place">
                <div class="hc-place-img"><img src="${d.image}" alt="${d.id}" onerror="this.parentElement.style.display='none'"></div>
                <div class="hc-place-text">
                    <div class="hc-name">${d.id}</div>
                    <div class="hc-meta">${d.neighborhood || ''}</div>
                </div>
            </div>`;
        } else {
            card.innerHTML = `<div class="hc-simple">
                <div class="hc-name">${d.id}</div>
                <div class="hc-meta">${d.neighborhood || ''}</div>
            </div>`;
        }
        card.classList.add('visible');
        moveCard(event);
    }

    function moveCard(event) {
        const x = event.clientX, y = event.clientY;
        const cw = 240, ch = card.offsetHeight;
        const vw = window.innerWidth, vh = window.innerHeight;
        card.style.left = (x + 14 + cw > vw ? x - cw - 14 : x + 14) + 'px';
        card.style.top  = (y + 14 + ch > vh ? y - ch - 14 : y + 14) + 'px';
    }

    function hideCard() { card.classList.remove('visible'); }

    // ── LEGEND TOGGLES ────────────────────────────────────────────────────────
    document.querySelectorAll('.legend-toggle').forEach(toggle => {
        const dot = toggle.querySelector('.toggle-dot');
        const originalColor = dot.style.background;
        toggle.addEventListener('click', () => {
            const isOff = toggle.classList.toggle('off');
            dot.style.background = isOff ? '#444' : originalColor;
            if (toggle.dataset.type === 'artist') showArtists = !isOff;
            else showPlaces = !isOff;
            render();
        });
    });

    // ── FILTER DROPDOWNS ─────────────────────────────────────────────────────
    const mediumTrigger = document.getElementById('medium-trigger');
    const mediumMenu    = document.getElementById('medium-menu');
    const nbhdTrigger   = document.getElementById('neighborhood-trigger');
    const nbhdMenu      = document.getElementById('neighborhood-menu');

    function closeAllDropdowns() {
        mediumMenu.classList.remove('open');
        nbhdMenu.classList.remove('open');
    }

    mediumTrigger.addEventListener('click', e => {
        e.stopPropagation();
        const opening = !mediumMenu.classList.contains('open');
        closeAllDropdowns();
        if (opening) mediumMenu.classList.add('open');
    });
    nbhdTrigger.addEventListener('click', e => {
        e.stopPropagation();
        const opening = !nbhdMenu.classList.contains('open');
        closeAllDropdowns();
        if (opening) nbhdMenu.classList.add('open');
    });
    document.addEventListener('click', closeAllDropdowns);

    mediumMenu.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const already = activeMedium === btn.dataset.medium;
            mediumMenu.querySelectorAll('button').forEach(b => b.classList.remove('chosen'));
            if (already) {
                activeMedium = null;
                mediumTrigger.textContent = 'Medium ▾';
                mediumTrigger.classList.remove('active');
            } else {
                activeMedium = btn.dataset.medium;
                btn.classList.add('chosen');
                mediumTrigger.textContent = activeMedium + ' ▾';
                mediumTrigger.classList.add('active');
            }
            closeAllDropdowns();
            render();
        });
    });

    nbhdMenu.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const already = activeNeighborhood === btn.dataset.neighborhood;
            nbhdMenu.querySelectorAll('button').forEach(b => b.classList.remove('chosen'));
            if (already) {
                activeNeighborhood = null;
                nbhdTrigger.textContent = 'Neighborhood ▾';
                nbhdTrigger.classList.remove('active');
            } else {
                activeNeighborhood = btn.dataset.neighborhood;
                btn.classList.add('chosen');
                nbhdTrigger.textContent = activeNeighborhood + ' ▾';
                nbhdTrigger.classList.add('active');
            }
            closeAllDropdowns();
            render();
        });
    });

    // ── PANCAKE ───────────────────────────────────────────────────────────────
    var pBtn = document.getElementById('pancake-btn'), pDrop = document.getElementById('pancake-drop');
    pBtn.addEventListener('click', e => { e.stopPropagation(); pBtn.classList.toggle('open'); pDrop.classList.toggle('open'); });
    var citiesTrigger = document.getElementById('cities-trigger');
    var citiesSubmenu = document.getElementById('cities-submenu');
    if (citiesTrigger) {
        citiesTrigger.addEventListener('click', e => {
            e.stopPropagation();
            citiesTrigger.classList.toggle('open');
            citiesSubmenu.classList.toggle('open');
        });
    }
    document.addEventListener('click', e => {
        if (!e.target.closest('.pancake-wrap')) {
            pBtn.classList.remove('open'); pDrop.classList.remove('open');
            if (citiesSubmenu) { citiesSubmenu.classList.remove('open'); if (citiesTrigger) citiesTrigger.classList.remove('open'); }
        }
    });

    // ── INIT ──────────────────────────────────────────────────────────────────
    render();
    window.addEventListener('resize', () => { getDims(); render(); });
    </script>
</body>
</html>
