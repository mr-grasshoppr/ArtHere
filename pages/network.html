<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Network - Art Here Portland</title>
    <link rel="icon" type="image/png" href="../images/ArtHere_favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; color: #fff; background: #0a0a0a; padding-top: 56px; padding-bottom: 56px; overflow: hidden; }

        /* ---- TOP BAR ---- */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid #1a1a1a; z-index: 200;
            display: flex; align-items: center; padding: 0 18px; gap: 12px;
        }
        .nav-logo { display: block; height: 26px; width: auto; transition: opacity 0.2s; }
        .nav-logo:hover { opacity: 0.7; }
        .pancake-wrap { position: relative; }
        .pancake-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; flex-direction: column; gap: 5px; }
        .pancake-btn span { display: block; width: 20px; height: 1.5px; background: rgba(255,255,255,0.8); transition: all 0.25s; }
        .pancake-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
        .pancake-btn.open span:nth-child(2) { opacity: 0; }
        .pancake-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
        .pancake-dropdown { display: none; position: absolute; top: calc(100% + 8px); left: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; overflow: hidden; min-width: 160px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 300; }
        .pancake-dropdown.open { display: block; }
        .pancake-dropdown a { display: block; padding: 13px 20px; font-size: 0.9rem; color: #ccc; text-decoration: none; border-bottom: 1px solid #222; transition: background 0.15s; }
        .pancake-dropdown a:last-child { border-bottom: none; }
        .pancake-dropdown a:hover { background: #222; color: #fff; }
        .pancake-dropdown a.join { font-weight: 600; color: #fff; }
        .nav-city { font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif; font-size: 0.95rem; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 0.03em; transition: opacity 0.2s; }
        .nav-city:hover { opacity: 0.6; }

        /* ---- FILTER BAR ---- */
        .filter-bar {
            position: fixed; top: 56px; left: 0; right: 0;
            z-index: 100; padding: 8px 18px;
            display: flex; gap: 8px; align-items: center;
            flex-wrap: nowrap;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            border-bottom: 1px solid #1a1a1a;
        }
        .filter-group {
            display: flex; gap: 6px; align-items: center; flex-shrink: 0;
        }
        .filter-group-dropdowns {
            display: flex; gap: 6px; align-items: center; flex-shrink: 0; margin-left: 4px;
        }
        /* Type pills: All / Artists / Community */
        .filter-btn {
            padding: 5px 13px; border-radius: 20px; border: 1px solid #2a2a2a;
            background: transparent; color: #666; font-size: 0.78rem; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em; white-space: nowrap;
        }
        .filter-btn:hover { border-color: #555; color: #ccc; }
        .filter-btn.active-artist { background: #00e5ff; border-color: #00e5ff; color: #000; font-weight: 600; }
        .filter-btn.active-place { background: #ff00aa; border-color: #ff00aa; color: #000; font-weight: 600; }
        .filter-btn.active-all { background: #fff; border-color: #fff; color: #000; font-weight: 600; }
        .filter-sep { width: 1px; height: 20px; background: #222; margin: 0 2px; flex-shrink: 0; }
        /* Dropdown triggers: square corners, dashed border to look distinct */
        .dropdown-trigger {
            border-radius: 6px !important;
            border: 1px dashed #3a3a3a !important;
            color: #666 !important;
            padding: 5px 10px !important;
        }
        .dropdown-trigger:hover { border-color: #666 !important; color: #ccc !important; }
        .dropdown-trigger.selected {
            border-color: #888 !important; border-style: solid !important; color: #fff !important;
        }
        @media (max-width: 600px) {
            .filter-bar { flex-wrap: wrap; padding: 8px 12px; }
            .filter-group-dropdowns { width: 100%; margin-left: 0; }
        }
        /* ---- DROPDOWNS ---- */
        .dropdown-wrap { position: relative; }
        .dropdown-menu {
            display: none; position: absolute; top: calc(100% + 6px); left: 0;
            background: #111; border: 1px solid #2a2a2a; border-radius: 8px;
            overflow: hidden; min-width: 160px; z-index: 400;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .dropdown-menu.open { display: block; }
        .dropdown-item {
            display: block; width: 100%; text-align: left;
            padding: 10px 16px; background: none; border: none;
            color: #888; font-size: 0.82rem; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: background 0.15s, color 0.15s;
            border-bottom: 1px solid #1a1a1a; letter-spacing: 0.03em;
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: #1a1a1a; color: #fff; }
        .dropdown-item.active { color: #00e5ff; font-weight: 600; }
        .dropdown-trigger.selected { border-color: #555; color: #fff; }


        /* ---- GRAPH ---- */
        #graph-container {
            position: fixed;
            top: 56px; /* will be adjusted by JS for filter bar height */
            left: 0; right: 0; bottom: 56px;
            overflow: hidden;
            touch-action: none;
        }
        #graph-container svg { width: 100%; height: 100%; display: block; }

        .node-label {
            font-size: 11px; fill: #888;
            pointer-events: none; font-family: 'Inter', sans-serif;
        }
        .node-label.artist-label { fill: #00e5ff; opacity: 0.8; }
        .node-label.place-label { fill: #ff00aa; opacity: 0.8; }

        /* ---- HOVER CARD ---- */
        .hover-card {
            position: fixed; z-index: 500;
            background: #111; border: 1px solid #222; border-radius: 8px;
            overflow: hidden; width: 240px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            pointer-events: none; opacity: 0;
            transition: opacity 0.15s;
        }
        .hover-card.visible { opacity: 1; }
        /* Artist card: circle photo + text */
        .hc-artist { display: flex; align-items: center; gap: 12px; padding: 14px; }
        .hc-artist-photo { width: 52px; height: 52px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #222; }
        .hc-artist-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
        .hc-artist-text {}
        .hc-name { font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 700; color: #fff; margin-bottom: 3px; }
        .hc-meta { font-size: 0.72rem; color: #888; line-height: 1.4; }
        /* Place card: rect image + text */
        .hc-place { display: flex; align-items: stretch; }
        .hc-place-img { width: 90px; flex-shrink: 0; overflow: hidden; background: #222; }
        .hc-place-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .hc-place-text { padding: 14px 12px; }
        /* No-image fallback */
        .hc-simple { padding: 14px; }

        /* ---- LEGEND ---- */
        .legend {
            position: fixed; bottom: 68px; left: 18px; right: 18px;
            display: flex; gap: 18px; z-index: 100; align-items: center; flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.75rem; color: #555; }
        .legend-suggest { font-size: 0.75rem; color: #444; text-decoration: none; transition: color 0.2s; }
        .legend-suggest:hover { color: #aaa; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* ---- BOTTOM BAR ---- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(8px);
            border-top: 1px solid #111; z-index: 100;
            display: flex; align-items: center; padding: 0 18px; gap: 0;
        }
        .bottom-bar-city { text-decoration: none; font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif; font-size: 0.95rem; font-weight: 700; color: #fff; letter-spacing: 0.03em; flex-shrink: 0; }
        .bottom-bar-divider { color: #444; margin: 0 14px; flex-shrink: 0; }
        .bottom-bar-links { display: flex; gap: 24px; align-items: center; }
        .bottom-bar-links a { color: rgba(255,255,255,0.45); text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.03em; transition: color 0.2s; padding: 4px 0; border-bottom: 1.5px solid transparent; }
        .bottom-bar-links a:hover { color: #fff; }
        .bottom-bar-links a.active { color: #fff; border-color: rgba(255,255,255,0.6); }
        @media (max-width: 600px) {
            .bottom-bar-city, .bottom-bar-divider { display: none; }
            .bottom-bar { justify-content: center; }
            .bottom-bar-links { gap: 20px; }
            .filter-bar { flex-wrap: wrap; }
            .filter-group-dropdowns { width: 100%; }
            .filter-label { display: none; }
        }

        /* ---- CITIES SUBMENU ---- */
        .pancake-dropdown .cities-item { position: relative; }
        .pancake-dropdown .cities-trigger {
            display: flex; justify-content: space-between; align-items: center;
            padding: 13px 20px; font-size: 0.9rem; color: #ccc; cursor: pointer;
            border-bottom: 1px solid #f0f0f0; transition: background 0.15s;
            background: none; border-left: none; border-right: none; border-top: none;
            width: 100%; text-align: left; font-family: 'Inter', -apple-system, sans-serif;
        }
        .pancake-dropdown .cities-trigger:hover { background: #222; color: #fff; }
        .pancake-dropdown .cities-arrow { font-size: 0.65rem; color: #555; transition: transform 0.2s; }
        .pancake-dropdown .cities-trigger.open .cities-arrow { transform: rotate(90deg); }
        .cities-submenu { display: none; background: #111; border-bottom: 1px solid #222; }
        .cities-submenu.open { display: block; }
        .cities-submenu a, .cities-submenu span {
            display: flex; align-items: baseline; gap: 8px;
            padding: 9px 20px 9px 28px; font-size: 0.85rem;
            color: #888; text-decoration: none;
            transition: background 0.15s;
        }
        .cities-submenu a:hover { background: #1a1a1a; color: #fff; }
        .cities-submenu .city-soon { color: #bbb; font-size: 0.72rem; }
    </style>
</head>

            <a href="community.html">community</a>
            <a href="network.html" class="active">network</a>
        </div>
    </nav>

    <script>
    // ── DATA ──────────────────────────────────────────────────────────────────
    const allNodes = [
        // Artists
        { id: "Kurtis Piltz",        type: "artist", medium: "Ceramicist",  neighborhood: "Multnomah Village",    url: "../artists/kurtis-piltz.html",          photo: "../images/artists/kurtis-piltz-bio.jpg" },
        { id: "Beth Bundy",          type: "artist", medium: "Illustrator", neighborhood: "Alberta Arts District", url: "../artists/beth-bundy.html",            photo: "../images/artists/beth-bundy-bio.jpg" },
        { id: "Yong Hong Zhong",     type: "artist", medium: "Painter",     neighborhood: "Portland",             url: "../artists/yong-hong-zhong.html",       photo: "../images/artists/yong-hong-zhong-bio.jpg" },
        { id: "Lindsey Fox",         type: "artist", medium: "Painter",     neighborhood: "Portland",             url: "../artists/lindsey-fox.html",           photo: "../images/artists/lindsey-fox-bio.jpg" },
        { id: "Jennifer Eaton White",type: "artist", medium: "Painter",     neighborhood: "Vancouver, WA",             url: "../artists/jennifer-eaton-white.html",  photo: "../images/artists/jennifer-eaton-white-bio.jpg" },
        // Community places
        { id: "Multnomah Arts Center",  type: "place", neighborhood: "Multnomah Village",    url: "../places/multnomah-arts-center.html",  image: "../images/places/multnomah.jpg" },
        { id: "ComeUnity PDX",          type: "place", neighborhood: "Multnomah Village",          url: "../places/comeunity-pdx.html",          image: "../images/places/communitypdx.jpg" },
        { id: "NW Marine Art Works",    type: "place", neighborhood: "Slabtown",        url: "../places/nw-marine-art-works.html",    image: "../images/places/nwmarine-header.jpg" },
        { id: "Alberta Street Gallery", type: "place", neighborhood: "Alberta Arts District", url: "https://www.albertastreetgallery.com" },
        { id: "PAM Rental Sales",       type: "place", neighborhood: "Portland",             image: null },
        { id: "Catlin Gabel",           type: "place", neighborhood: "Portland",             image: null },
        { id: "Lincoln High School",    type: "place", neighborhood: "Portland",             image: null },
        { id: "Clinton St Coffeehouse", type: "place", neighborhood: "Portland",             image: null },
        { id: "Rudy's Barbershop",      type: "place", neighborhood: "Alberta Arts District",image: null },
        { id: "Casa Luna",              type: "place", neighborhood: "Portland",             image: null },
        { id: "PSU",                    type: "place", neighborhood: "Portland",             image: null },
        { id: "PCC",                    type: "place", neighborhood: "Portland",             image: null },
    ];

    const allLinks = [
        { source: "Kurtis Piltz",         target: "Multnomah Arts Center" },
        { source: "Kurtis Piltz",         target: "Catlin Gabel" },
        { source: "Kurtis Piltz",         target: "PSU" },
        { source: "Kurtis Piltz",         target: "PCC" },
        { source: "Beth Bundy",           target: "Lincoln High School" },
        { source: "Beth Bundy",           target: "Clinton St Coffeehouse" },
        { source: "Beth Bundy",           target: "Rudy's Barbershop" },
        { source: "Yong Hong Zhong",      target: "PAM Rental Sales" },
        { source: "Lindsey Fox",          target: "NW Marine Art Works" },
        { source: "Lindsey Fox",          target: "ComeUnity PDX" },
        { source: "Yong Hong Zhong",      target: "Alberta Street Gallery" },
        { source: "Jennifer Eaton White", target: "Alberta Street Gallery" },
        { source: "Jennifer Eaton White", target: "Casa Luna" },
    ];

    // ── STATE ─────────────────────────────────────────────────────────────────
    let activeType = null, activeMedium = null, activeNeighborhood = null;

    // ── SETUP ─────────────────────────────────────────────────────────────────
    const filterBar = document.getElementById('filter-bar');
    const container = document.getElementById('graph-container');

    function reposition() {
        const fbH = filterBar.offsetHeight;
        container.style.top = (56 + fbH) + 'px';
    }
    reposition();
    window.addEventListener('resize', reposition);

    const svg = d3.select('#network');
    let W, H;

    function getDims() {
        W = container.clientWidth;
        H = container.clientHeight;
    }
    getDims();

    // zoom/pan
    const zoomG = svg.append('g');
    const zoom = d3.zoom().scaleExtent([0.3, 4]).on('zoom', e => zoomG.attr('transform', e.transform));
    svg.call(zoom);

    // double-tap to reset
    svg.on('dblclick.zoom', () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity));

    // ── RENDER ────────────────────────────────────────────────────────────────
    let linkSel, nodeSel, sim;

    function getVisible() {
        const portlandSuburbs = ['Multnomah Village','Alberta Arts District','Slabtown','NE Portland'];
        let nodes = allNodes.filter(n => {
            if (activeType && n.type !== activeType) return false;
            if (activeMedium && n.medium !== activeMedium) return false;
            if (activeNeighborhood) {
                if (activeNeighborhood === 'Portland') {
                    // "Portland — all" shows everything in the Portland metro
                    if (!n.neighborhood || n.neighborhood === 'Vancouver, WA') return false;
                } else {
                    if (n.neighborhood !== activeNeighborhood) return false;
                }
            }
            return true;
        });
        const nodeIds = new Set(nodes.map(n => n.id));
        // include place nodes connected to visible artists even if filtered
        const links = allLinks.filter(l => nodeIds.has(l.source.id || l.source) && nodeIds.has(l.target.id || l.target));
        return { nodes, links };
    }

    function nodeRadius(d) {
        const deg = allLinks.filter(l => l.source === d.id || l.target === d.id || l.source.id === d.id || l.target.id === d.id).length;
        return d.type === 'artist' ? 10 + deg * 1.5 : 7 + deg * 1.2;
    }

    const colors = { artist: '#00e5ff', place: '#ff00aa' };

    function render() {
        zoomG.selectAll('*').remove();
        getDims();

        const { nodes, links } = getVisible();

        // deep-copy nodes for simulation
        const simNodes = nodes.map(n => Object.assign({}, n));
        const idMap = {};
        simNodes.forEach(n => idMap[n.id] = n);
        const simLinks = links.map(l => ({
            source: idMap[l.source.id || l.source],
            target: idMap[l.target.id || l.target],
        })).filter(l => l.source && l.target);

        if (sim) sim.stop();
        sim = d3.forceSimulation(simNodes)
            .force('link', d3.forceLink(simLinks).id(d => d.id).distance(d => {
                return (d.source.type === 'artist' && d.target.type === 'artist') ? 140 : 100;
            }).strength(0.4))
            .force('charge', d3.forceManyBody().strength(-320))
            .force('center', d3.forceCenter(W / 2, H / 2))
            .force('collide', d3.forceCollide().radius(d => nodeRadius(d) + 18));

        linkSel = zoomG.append('g')
            .attr('stroke', '#2a2a2a').attr('stroke-opacity', 0.8)
            .selectAll('line').data(simLinks).join('line')
            .attr('stroke-width', 1);

        nodeSel = zoomG.append('g')
            .selectAll('g').data(simNodes).join('g')
            .style('cursor', d => d.url ? 'pointer' : 'default')
            .call(d3.drag()
                .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
                .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
            .on('click', (e, d) => { if (d.url) window.location.href = d.url; })
            .on('mouseover', showCard)
            .on('mousemove', moveCard)
            .on('mouseout',  hideCard)
            .on('touchstart', (e, d) => { e.preventDefault(); showCard(e.touches[0], d); }, { passive: false })
            .on('touchend', hideCard);

        nodeSel.append('circle')
            .attr('r', d => nodeRadius(d))
            .attr('fill', d => colors[d.type] || '#888')
            .attr('stroke', '#0a0a0a').attr('stroke-width', 2)
            .style('opacity', 0)
            .transition().duration(400).delay((d, i) => i * 30)
            .style('opacity', 1);

        nodeSel.append('text')
            .attr('class', d => 'node-label ' + d.type + '-label')
            .attr('dy', d => nodeRadius(d) + 14)
            .attr('text-anchor', 'middle')
            .text(d => d.id)
            .style('opacity', 0)
            .transition().duration(400).delay((d, i) => i * 30 + 100)
            .style('opacity', 1);

        sim.on('tick', () => {
            linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                   .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
            nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
        });

        // center zoom on first render
        svg.call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(1));
    }

    // ── HOVER CARD ────────────────────────────────────────────────────────────
    const card = document.getElementById('hover-card');

    function showCard(event, d) {
        if (d.type === 'artist') {
            card.innerHTML = `<div class="hc-artist">
                <div class="hc-artist-photo"><img src="${d.photo}" alt="${d.id}" onerror="this.style.display='none'"></div>
                <div class="hc-artist-text">
                    <div class="hc-name">${d.id}</div>
                    <div class="hc-meta">${d.medium}<br>${d.neighborhood}</div>
                </div>
            </div>`;
        } else if (d.image) {
            card.innerHTML = `<div class="hc-place">
                <div class="hc-place-img"><img src="${d.image}" alt="${d.id}" onerror="this.parentElement.style.display='none'"></div>
                <div class="hc-place-text">
                    <div class="hc-name">${d.id}</div>
                    <div class="hc-meta">${d.neighborhood || ''}</div>
                </div>
            </div>`;
        } else {
            card.innerHTML = `<div class="hc-simple">
                <div class="hc-name">${d.id}</div>
                <div class="hc-meta">${d.neighborhood || ''}</div>
            </div>`;
        }
        card.classList.add('visible');
        moveCard(event);
    }

    function moveCard(event) {
        const x = event.clientX, y = event.clientY;
        const cw = 240, ch = card.offsetHeight;
        const vw = window.innerWidth, vh = window.innerHeight;
        card.style.left = (x + 14 + cw > vw ? x - cw - 14 : x + 14) + 'px';
        card.style.top  = (y + 14 + ch > vh ? y - ch - 14 : y + 14) + 'px';
    }

    function hideCard() { card.classList.remove('visible'); }

    // ── FILTERS ───────────────────────────────────────────────────────────────
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.className = 'filter-btn');
            const f = btn.dataset.filter;
            activeType = f === 'all' ? null : f;
            activeMedium = null; activeNeighborhood = null;
            document.querySelectorAll('.filter-btn[data-medium], .filter-btn[data-neighborhood]').forEach(b => b.className = 'filter-btn');
            btn.className = 'filter-btn active-' + f;
            render();
        });
    });

    // ── DROPDOWNS ────────────────────────────────────────────────────────────
    function setupDropdown(triggerId, menuId) {
        const trigger = document.getElementById(triggerId);
        const menu = document.getElementById(menuId);
        trigger.addEventListener('click', e => {
            e.stopPropagation();
            document.querySelectorAll('.dropdown-menu').forEach(m => { if (m !== menu) m.classList.remove('open'); });
            menu.classList.toggle('open');
        });
        return { trigger, menu };
    }

    const mediumDD = setupDropdown('medium-trigger', 'medium-menu');
    const neighborhoodDD = setupDropdown('neighborhood-trigger', 'neighborhood-menu');

    document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
    });

    document.querySelectorAll('.dropdown-item[data-medium]').forEach(item => {
        item.addEventListener('click', e => {
            e.stopPropagation();
            const already = activeMedium === item.dataset.medium;
            document.querySelectorAll('.dropdown-item[data-medium]').forEach(i => i.classList.remove('active'));
            activeMedium = already ? null : item.dataset.medium;
            activeNeighborhood = null;
            document.querySelectorAll('.dropdown-item[data-neighborhood]').forEach(i => i.classList.remove('active'));
            if (!already) {
                item.classList.add('active');
                activeType = 'artist';
                mediumDD.trigger.classList.add('selected');
                mediumDD.trigger.textContent = item.dataset.medium + ' ▾';
            } else {
                activeType = null;
                mediumDD.trigger.classList.remove('selected');
                mediumDD.trigger.innerHTML = 'Medium &#9662;';
            }
            neighborhoodDD.trigger.classList.remove('selected');
            neighborhoodDD.trigger.innerHTML = 'Neighborhood &#9662;';
            document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.className = 'filter-btn');
            document.querySelector('.filter-btn[data-filter="' + (activeType || 'all') + '"]').className = 'filter-btn active-' + (activeType || 'all');
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
            render();
        });
    });

    document.querySelectorAll('.dropdown-item[data-neighborhood]').forEach(item => {
        item.addEventListener('click', e => {
            e.stopPropagation();
            const already = activeNeighborhood === item.dataset.neighborhood;
            document.querySelectorAll('.dropdown-item[data-neighborhood]').forEach(i => i.classList.remove('active'));
            activeNeighborhood = already ? null : item.dataset.neighborhood;
            activeMedium = null;
            document.querySelectorAll('.dropdown-item[data-medium]').forEach(i => i.classList.remove('active'));
            if (!already) {
                item.classList.add('active');
                neighborhoodDD.trigger.classList.add('selected');
                neighborhoodDD.trigger.textContent = item.dataset.neighborhood + ' ▾';
            } else {
                neighborhoodDD.trigger.classList.remove('selected');
                neighborhoodDD.trigger.innerHTML = 'Neighborhood &#9662;';
            }
            mediumDD.trigger.classList.remove('selected');
            mediumDD.trigger.innerHTML = 'Medium &#9662;';
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
            render();
        });
    });


    // ── PANCAKE ───────────────────────────────────────────────────────────────
    var btn = document.getElementById('pancake-btn'), drop = document.getElementById('pancake-drop');
    btn.addEventListener('click', e => { e.stopPropagation(); btn.classList.toggle('open'); drop.classList.toggle('open'); });
    document.addEventListener('click', () => { btn.classList.remove('open'); drop.classList.remove('open'); });

    // ── INIT ──────────────────────────────────────────────────────────────────
    render();
    window.addEventListener('resize', () => { getDims(); render(); });
    </script>
</body>
</html>
