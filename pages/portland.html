<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portland - Art Here</title>
    <link rel="icon" type="image/png" href="../images/ArtHere_favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }

        /* ---- TOP-LEFT CHROME ---- */
        .city-chrome {
            position: fixed;
            top: 0; left: 0;
            z-index: 50;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-start;
        }
        .chrome-logo {
            display: block;
            height: 36px;
            width: auto;
            opacity: 0.92;
            transition: opacity 0.2s;
        }
        .chrome-logo:hover { opacity: 1; }
        .pancake-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .pancake-btn span {
            display: block;
            width: 20px;
            height: 1.5px;
            background: rgba(255,255,255,0.8);
            transition: all 0.25s;
        }
        .pancake-btn.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
        .pancake-btn.open span:nth-child(2) { opacity: 0; }
        .pancake-btn.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

        /* ---- SLIDE-IN MENU ---- */
        .menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 98;
        }
        .menu-overlay.open { display: block; }
        .pancake-menu {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 260px;
            height: 100vh;
            background: #111;
            border-right: 1px solid #222;
            z-index: 99;
            padding: 80px 0 40px;
            flex-direction: column;
        }
        .pancake-menu.open { display: flex; }
        .pancake-menu a {
            display: block;
            padding: 16px 32px;
            font-size: 1rem;
            color: #eee;
            text-decoration: none;
            border-bottom: 1px solid #1e1e1e;
            transition: color 0.2s, background 0.2s;
        }
        .pancake-menu a:hover { background: #1a1a1a; color: #fff; }
        .pancake-menu a.join { font-weight: 600; color: #fff; }

        /* ---- CITY TITLE + SUB-NAV ---- */
        .city-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 40;
            padding: 20px 24px 0;
            pointer-events: none;
        }
        .city-title {
            font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
            font-size: clamp(2.8rem, 8vw, 6rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
            line-height: 1;
            text-align: center;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
            margin-top: 10px;
        }
        .sub-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 40;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 36px;
            padding: 22px 24px;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
        }
        .sub-nav a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.88rem;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
        }
        .sub-nav a:hover, .sub-nav a.active {
            color: #fff;
            border-color: rgba(255,255,255,0.6);
        }

        /* ---- SCROLLING ARTWORK GRID ---- */
        .grid-viewport {
            position: fixed;
            inset: 0;
            overflow: hidden;
        }

        /* The 2x2 logo cell — pinned top-left of the grid */
        .logo-cell {
            position: absolute;
            top: 0; left: 0;
            width: calc(var(--col) * 2 + var(--gap));
            height: calc(var(--col) * 2 + var(--gap));
            z-index: 45;
            overflow: hidden;
        }
        .logo-cell-mask {
            width: 100%;
            height: 100%;
            -webkit-mask-image: url('../images/arthere-mask.png');
            mask-image: url('../images/arthere-mask.png');
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: 75%;
            mask-size: 75%;
        }
        .logo-cell-mask img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 40%;
        }

        /* The scrolling grid track */
        .grid-track {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--col));
            gap: var(--gap);
            padding: var(--gap);
            animation: scrollUp var(--scroll-duration) linear infinite;
        }
        .grid-track.artwork-mode {
            animation: none;
            overflow-y: auto;
            height: 100vh;
        }
        .grid-cell {
            width: var(--col);
            overflow: hidden;
            border-radius: 2px;
            background: #111;
            flex-shrink: 0;
        }
        .grid-cell.logo-placeholder {
            grid-column: span 2;
            grid-row: span 2;
            background: transparent;
            pointer-events: none;
        }
        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            transition: transform 0.4s;
        }
        .grid-cell.clickable { cursor: pointer; }
        .grid-cell.clickable:hover img { transform: scale(1.04); }

        @keyframes scrollUp {
            0%   { transform: translateY(0); }
            100% { transform: translateY(var(--scroll-dist)); }
        }

        /* Mode: ambient (default) vs artwork browse */
        body.ambient-mode .sub-nav a[data-section="artwork"] { border-color: transparent; }
        body.artwork-mode .grid-cell { cursor: pointer; }
        body.artwork-mode .grid-viewport { overflow-y: auto; overflow-x: hidden; position: absolute; }
    </style>
</head>
<body class="ambient-mode">

    <!-- MENU OVERLAY -->
    <div class="menu-overlay" id="menu-overlay"></div>
    <nav class="pancake-menu" id="pancake-menu">
        <a href="survey.html" class="join">Join Us</a>
        <a href="about.html">About</a>
        <a href="about.html#contact">Contact</a>
    </nav>

    <!-- TOP-LEFT CHROME -->
    <div class="city-chrome">
        <a href="../index.html"><img src="../images/arthere-logo-white.png" alt="Art Here" class="chrome-logo"></a>
        <button class="pancake-btn" id="pancake-btn" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </div>

    <!-- CITY TITLE -->
    <div class="city-header">
        <div class="city-title">Portland</div>
    </div>

    <!-- ARTWORK GRID -->
    <div class="grid-viewport" id="grid-viewport">
        <div class="grid-track" id="grid-track">
            <!-- Logo placeholder (2x2) -->
            <div class="grid-cell logo-placeholder"></div>
            <!-- Artwork cells injected by JS -->
        </div>
    </div>

    <!-- LOGO CELL (pinned, masked) -->
    <div class="logo-cell" id="logo-cell">
        <div class="logo-cell-mask">
            <img src="../images/portland-sign.jpg" alt="Portland">
        </div>
    </div>

    <!-- SUB-NAV -->
    <nav class="sub-nav" id="sub-nav">
        <a href="portland.html#artwork" data-section="artwork" id="nav-artwork">artwork</a>
        <a href="../artists/kurtis-piltz.html" data-section="artists" id="nav-artists">artists</a>
        <a href="#community" data-section="community" id="nav-community">community</a>
        <a href="network.html" data-section="network" id="nav-network">network</a>
    </nav>

    <script>
    // ---- CONFIG ----
    var COLS = window.innerWidth < 600 ? 3 : 4;
    var GAP = 4;
    var COL = Math.floor((window.innerWidth - GAP * (COLS + 1)) / COLS);

    document.documentElement.style.setProperty('--cols', COLS);
    document.documentElement.style.setProperty('--col', COL + 'px');
    document.documentElement.style.setProperty('--gap', GAP + 'px');

    // Size logo cell
    var logoCell = document.getElementById('logo-cell');
    var logoCellSize = COL * 2 + GAP;
    logoCell.style.width = logoCellSize + 'px';
    logoCell.style.height = logoCellSize + 'px';

    // ---- ARTWORK DATA ----
    var allArtwork = [
        { src: '../images/artwork/beth-bundy-1.jpg',           artist: '../artists/beth-bundy.html',           h: 1 },
        { src: '../images/artwork/beth-bundy-2.jpg',           artist: '../artists/beth-bundy.html',           h: 1 },
        { src: '../images/artwork/beth-bundy-3.jpg',           artist: '../artists/beth-bundy.html',           h: 1 },
        { src: '../images/artwork/beth-bundy-hero.jpg',        artist: '../artists/beth-bundy.html',           h: 1 },
        { src: '../images/artwork/jennifer-eaton-white-1.jpg', artist: '../artists/jennifer-eaton-white.html', h: 1 },
        { src: '../images/artwork/jennifer-eaton-white-2.jpg', artist: '../artists/jennifer-eaton-white.html', h: 1 },
        { src: '../images/artwork/jennifer-eaton-white-3.jpg', artist: '../artists/jennifer-eaton-white.html', h: 1 },
        { src: '../images/artwork/kurtis-piltz-1.jpg',         artist: '../artists/kurtis-piltz.html',         h: 1 },
        { src: '../images/artwork/kurtis-piltz-2.jpg',         artist: '../artists/kurtis-piltz.html',         h: 1 },
        { src: '../images/artwork/kurtis-piltz-3.jpg',         artist: '../artists/kurtis-piltz.html',         h: 1 },
        { src: '../images/artwork/kurtis-piltz-hero.jpg',      artist: '../artists/kurtis-piltz.html',         h: 1 },
        { src: '../images/artwork/lindsey-fox-1.jpg',          artist: '../artists/lindsey-fox.html',          h: 2 },
        { src: '../images/artwork/lindsey-fox-2.jpg',          artist: '../artists/lindsey-fox.html',          h: 1 },
        { src: '../images/artwork/lindsey-fox-3.jpg',          artist: '../artists/lindsey-fox.html',          h: 1 },
        { src: '../images/artwork/lindsey-fox-hero.jpg',       artist: '../artists/lindsey-fox.html',          h: 1 },
        { src: '../images/artwork/yong-hong-zhong-1.jpg',      artist: '../artists/yong-hong-zhong.html',      h: 1 },
        { src: '../images/artwork/yong-hong-zhong-2.jpg',      artist: '../artists/yong-hong-zhong.html',      h: 1 },
        { src: '../images/artwork/yong-hong-zhong-3.jpg',      artist: '../artists/yong-hong-zhong.html',      h: 1 },
        { src: '../images/artwork/yong-hong-zhong-4.jpg',      artist: '../artists/yong-hong-zhong.html',      h: 1 },
    ];

    // Shuffle array
    function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    // Build grid cells
    function buildGrid(clickable) {
        var track = document.getElementById('grid-track');
        // Clear existing cells (keep placeholder)
        var cells = track.querySelectorAll('.grid-cell:not(.logo-placeholder)');
        cells.forEach(function(c) { c.remove(); });

        var images = shuffle(allArtwork);
        // Double up for seamless scroll loop
        var set = clickable ? images : images.concat(images).concat(images);

        set.forEach(function(art) {
            var cell = document.createElement('div');
            cell.className = 'grid-cell' + (clickable ? ' clickable' : '');
            var cellH = art.h === 2 ? COL * 2 + GAP : COL;
            cell.style.height = cellH + 'px';
            if (art.h === 2) cell.style.gridRow = 'span 2';

            var img = document.createElement('img');
            img.src = art.src;
            img.alt = '';
            img.loading = 'lazy';
            // Smart crop: center-weighted, avoid edges
            img.style.objectPosition = 'center 35%';
            cell.appendChild(img);

            if (clickable) {
                cell.addEventListener('click', function() {
                    window.location.href = art.artist;
                });
            }
            track.appendChild(cell);
        });

        // Set scroll distance for animation
        var rowH = COL + GAP;
        var totalRows = Math.ceil(images.length / COLS);
        var scrollDist = totalRows * rowH;
        document.documentElement.style.setProperty('--scroll-dist', '-' + scrollDist + 'px');
        document.documentElement.style.setProperty('--scroll-duration', (totalRows * 6) + 's');
    }

    // ---- MODES ----
    var isAmbient = true;

    function setAmbientMode() {
        isAmbient = true;
        document.body.className = 'ambient-mode';
        document.getElementById('grid-track').style.animation = '';
        document.getElementById('grid-viewport').style.overflowY = 'hidden';
        document.getElementById('nav-artwork').classList.remove('active');
        buildGrid(false);
        // Re-apply animation
        var track = document.getElementById('grid-track');
        track.style.animation = 'none';
        track.offsetHeight; // reflow
        track.style.animation = '';
    }

    function setArtworkMode() {
        isAmbient = false;
        document.body.className = 'artwork-mode';
        document.getElementById('grid-track').style.animation = 'none';
        document.getElementById('grid-viewport').style.overflowY = 'auto';
        document.getElementById('nav-artwork').classList.add('active');
        buildGrid(true);
    }

    document.getElementById('nav-artwork').addEventListener('click', function(e) {
        e.preventDefault();
        if (isAmbient) { setArtworkMode(); }
        else { setAmbientMode(); }
    });

    // ---- MENU ----
    var pancakeBtn = document.getElementById('pancake-btn');
    var pancakeMenu = document.getElementById('pancake-menu');
    var menuOverlay = document.getElementById('menu-overlay');
    function toggleMenu() {
        pancakeBtn.classList.toggle('open');
        pancakeMenu.classList.toggle('open');
        menuOverlay.classList.toggle('open');
    }
    pancakeBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    // ---- INIT ----
    buildGrid(false);
    </script>
</body>
</html>
