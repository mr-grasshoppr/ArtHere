<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portland - Art Here</title>
    <link rel="icon" type="image/png" href="../images/ArtHere_favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }

        /* ---- TOP BAR ---- */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 56px; background: #000; z-index: 100;
            display: flex; align-items: center; padding: 0 18px; gap: 12px;
        }
        .nav-logo { display: block; height: 26px; width: auto; opacity: 0.9; transition: opacity 0.2s; flex-shrink: 0; }
        .nav-logo:hover { opacity: 1; }
        .pancake-wrap { position: relative; flex-shrink: 0; }
        .pancake-btn {
            background: none; border: none; cursor: pointer; padding: 4px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .pancake-btn span { display: block; width: 18px; height: 1.5px; background: rgba(255,255,255,0.85); transition: all 0.25s; }
        .pancake-btn.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
        .pancake-btn.open span:nth-child(2) { opacity: 0; }
        .pancake-btn.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }
        .pancake-dropdown {
            display: none; position: absolute; top: calc(100% + 8px); left: 0;
            background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
            overflow: hidden; min-width: 160px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 200;
        }
        .pancake-dropdown.open { display: block; }
        .pancake-dropdown a { display: block; padding: 13px 20px; font-size: 0.9rem; color: #ccc; text-decoration: none; border-bottom: 1px solid #222; transition: background 0.15s, color 0.15s; }
        .pancake-dropdown a:last-child { border-bottom: none; }
        .pancake-dropdown a:hover { background: #222; color: #fff; }
        .pancake-dropdown a.join { font-weight: 600; color: #fff; }
        .nav-city { font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif; font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.85); text-decoration: none; letter-spacing: 0.03em; transition: opacity 0.2s; }
        .nav-city:hover { opacity: 0.7; }

        /* ---- GRID ---- */
        .grid-viewport { position: fixed; top: 56px; left: 0; right: 0; bottom: 56px; overflow: hidden; }
        .grid-viewport.browse { overflow-y: auto; }
        .grid-track {
            position: absolute; top: 0; left: 0; right: 0;
            display: grid; gap: var(--gap); padding: var(--gap);
            will-change: transform;
        }
        .grid-track.scrolling { animation: scrollUp var(--dur) linear infinite; }
        @keyframes scrollUp { from { transform: translateY(0); } to { transform: translateY(var(--dist)); } }

        /* Artwork cells */
        .grid-cell { overflow: hidden; border-radius: 6px; background: #111; }
        .grid-cell img { width: 100%; height: 100%; object-fit: cover; object-position: center 35%; display: block; }
        .grid-cell.tall { grid-row: span 2; }
        .grid-cell.clickable { cursor: pointer; }
        .grid-cell.clickable img { transition: transform 0.3s; }
        .grid-cell.clickable:hover img { transform: scale(1.04); }

        /* Logo cells — 2 panels side by side, each 1 square (one row) */
        .logo-panel {
            overflow: hidden;
            border-radius: 6px;
            background: #0a0a0a;
            position: relative;
        }
        .logo-panel-inner {
            position: absolute; inset: 0;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: contain;
            mask-size: contain;
        }
        /* Left panel: A (top) over HE (bottom) */
        .logo-panel.left .logo-panel-inner {
            -webkit-mask-image: url('../images/arthere-mask-left.png');
            mask-image: url('../images/arthere-mask-left.png');
        }
        /* Right panel: RT (top) over RE (bottom) */
        .logo-panel.right .logo-panel-inner {
            -webkit-mask-image: url('../images/arthere-mask-right.png');
            mask-image: url('../images/arthere-mask-right.png');
        }
        .logo-panel-inner img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center 35%;
        }

        /* ---- BOTTOM BAR ---- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100;
            display: flex; justify-content: center; align-items: center; gap: 36px;
        }
        .bottom-bar a {
            color: rgba(255,255,255,0.65); text-decoration: none;
            font-size: 0.92rem; font-weight: 600; letter-spacing: 0.06em; text-transform: lowercase;
            transition: color 0.2s; padding: 4px 0; border-bottom: 2px solid transparent;
        }
        .bottom-bar a:hover, .bottom-bar a.active { color: #fff; border-color: rgba(255,255,255,0.6); }

        /* Touch hint */
        .touch-hint {
            position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.6); font-size: 0.75rem;
            letter-spacing: 0.08em; padding: 6px 14px; border-radius: 20px;
            pointer-events: none; opacity: 0; transition: opacity 0.5s; z-index: 90;
        }
        .touch-hint.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html"><img src="../images/arthere-logo-white.png" alt="Art Here" class="nav-logo"></a>
        <div class="pancake-wrap">
            <button class="pancake-btn" id="pancake-btn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <div class="pancake-dropdown" id="pancake-drop">
                <a href="survey.html" class="join">Join Us</a>
                <a href="about.html">About</a>
                <a href="about.html#contact">Contact</a>
            </div>
        </div>
        <a href="portland.html" class="nav-city">Portland</a>
    </div>

    <div class="grid-viewport" id="grid-vp">
        <div class="grid-track" id="grid-track"></div>
    </div>

    <div class="touch-hint" id="touch-hint">tap to browse artwork</div>

    <nav class="bottom-bar">
        <a href="#" id="nav-artwork">artwork</a>
        <a href="artists.html">artists</a>
        <a href="community.html">community</a>
        <a href="network.html">network</a>
    </nav>

    <script>
    var COLS = window.innerWidth < 500 ? 3 : 4;
    var GAP = 5;
    var VW = window.innerWidth;
    var COL = Math.floor((VW - GAP * (COLS + 1)) / COLS);
    var ROW = COL;

    document.documentElement.style.setProperty('--gap', GAP + 'px');
    document.getElementById('grid-track').style.gridTemplateColumns = 'repeat(' + COLS + ',' + COL + 'px)';

    var ALL = [
        { src: '../images/artwork/beth-bundy-hero.jpg',           url: '../artists/beth-bundy.html',            tall: true  },
        { src: '../images/artwork/beth-bundy-1.jpg',              url: '../artists/beth-bundy.html',            tall: false },
        { src: '../images/artwork/beth-bundy-2.jpg',              url: '../artists/beth-bundy.html',            tall: false },
        { src: '../images/artwork/beth-bundy-3.jpg',              url: '../artists/beth-bundy.html',            tall: false },
        { src: '../images/artwork/jennifer-eaton-white-hero.jpg', url: '../artists/jennifer-eaton-white.html',  tall: true  },
        { src: '../images/artwork/jennifer-eaton-white-1.jpg',    url: '../artists/jennifer-eaton-white.html',  tall: false },
        { src: '../images/artwork/jennifer-eaton-white-2.jpg',    url: '../artists/jennifer-eaton-white.html',  tall: false },
        { src: '../images/artwork/kurtis-piltz-hero.jpg',         url: '../artists/kurtis-piltz.html',          tall: true  },
        { src: '../images/artwork/kurtis-piltz-1.jpg',            url: '../artists/kurtis-piltz.html',          tall: false },
        { src: '../images/artwork/kurtis-piltz-2.jpg',            url: '../artists/kurtis-piltz.html',          tall: false },
        { src: '../images/artwork/kurtis-piltz-3.jpg',            url: '../artists/kurtis-piltz.html',          tall: false },
        { src: '../images/artwork/lindsey-fox-hero.jpg',          url: '../artists/lindsey-fox.html',           tall: true  },
        { src: '../images/artwork/lindsey-fox-1.jpg',             url: '../artists/lindsey-fox.html',           tall: false },
        { src: '../images/artwork/lindsey-fox-2.jpg',             url: '../artists/lindsey-fox.html',           tall: false },
        { src: '../images/artwork/lindsey-fox-3.jpg',             url: '../artists/lindsey-fox.html',           tall: false },
        { src: '../images/artwork/yong-hong-zhong-1.jpg',         url: '../artists/yong-hong-zhong.html',       tall: true  },
        { src: '../images/artwork/yong-hong-zhong-2.jpg',         url: '../artists/yong-hong-zhong.html',       tall: false },
        { src: '../images/artwork/yong-hong-zhong-3.jpg',         url: '../artists/yong-hong-zhong.html',       tall: false },
        { src: '../images/artwork/yong-hong-zhong-4.jpg',         url: '../artists/yong-hong-zhong.html',       tall: false },
    ];

    function shuffle(a) {
        var arr = a.slice();
        for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
        }
        return arr;
    }

    function makeLogoPanel(side, artSrc) {
        var panel = document.createElement('div');
        panel.className = 'logo-panel ' + side;
        panel.style.height = ROW + 'px';
        var inner = document.createElement('div');
        inner.className = 'logo-panel-inner';
        var img = document.createElement('img');
        img.src = artSrc;
        img.alt = '';
        inner.appendChild(img);
        panel.appendChild(inner);
        return panel;
    }

    function makeCell(art, clickable) {
        var c = document.createElement('div');
        c.className = 'grid-cell' + (art.tall ? ' tall' : '') + (clickable ? ' clickable' : '');
        c.style.height = (art.tall ? ROW * 2 + GAP : ROW) + 'px';
        if (art.tall) c.style.gridRow = 'span 2';
        var img = document.createElement('img');
        img.src = art.src; img.alt = ''; img.loading = 'lazy';
        c.appendChild(img);
        if (clickable) c.addEventListener('click', function() { window.location.href = art.url; });
        return c;
    }

    // Insert a logo row: one row tall. Logo occupies 2 adjacent columns
    // (either the LEFT two or RIGHT two), rest of the row is artwork.
    // alignRight=false -> logo in columns 1-2; alignRight=true -> logo in last 2 columns.
    function insertLogoRow(track, artPool, poolIdx, clickable, alignRight) {
        var leftArt = artPool[poolIdx % artPool.length];
        var rightArt = artPool[(poolIdx + 1) % artPool.length];
        var fillCount = COLS - 2;
        var cells = [];

        // Build the two logo panels
        var lp = makeLogoPanel('left', leftArt.src);
        var rp = makeLogoPanel('right', rightArt.src);

        if (alignRight) {
            // artwork first, then logo on the right
            for (var c = 0; c < fillCount; c++) {
                var art = artPool[(poolIdx + 2 + c) % artPool.length];
                track.appendChild(makeCell({src: art.src, url: art.url, tall: false}, clickable));
            }
            track.appendChild(lp);
            track.appendChild(rp);
        } else {
            // logo on the left, then artwork
            track.appendChild(lp);
            track.appendChild(rp);
            for (var c2 = 0; c2 < fillCount; c2++) {
                var art2 = artPool[(poolIdx + 2 + c2) % artPool.length];
                track.appendChild(makeCell({src: art2.src, url: art2.url, tall: false}, clickable));
            }
        }
        return poolIdx + 2 + fillCount;
    }

    function buildGrid(clickable) {
        var track = document.getElementById('grid-track');
        track.innerHTML = '';
        track.classList.remove('scrolling');

        // 3x each artwork, shuffled fresh each time
        var base = shuffle(ALL);
        var set = base.concat(shuffle(ALL)).concat(shuffle(ALL));

        var imgIdx = 0;
        var rowCount = 0;
        var LOGO_EVERY = 8; // rows between logo appearances
        var logoCount = 0;  // toggles left/right alignment

        // First: logo row at top (left-aligned)
        imgIdx = insertLogoRow(track, set, imgIdx, clickable, false);
        rowCount = 1;
        logoCount = 1;

        var lastWasTall = false;
        while (imgIdx < set.length) {
            if (rowCount > 0 && rowCount % LOGO_EVERY === 0) {
                // Alternate alignment each time the logo appears
                var alignRight = (logoCount % 2 === 1);
                imgIdx = insertLogoRow(track, set, imgIdx, clickable, alignRight);
                rowCount += 1;
                logoCount += 1;
            } else {
                var art = set[imgIdx++ % set.length];
                var useTall = art.tall && !lastWasTall;
                lastWasTall = useTall;
                track.appendChild(makeCell({src: art.src, url: art.url, tall: useTall}, clickable));
                rowCount++;
            }
        }

        if (!clickable) {
            var rows = Math.ceil(ALL.length / COLS);
            var dist = rows * (ROW + GAP);
            document.documentElement.style.setProperty('--dist', '-' + dist + 'px');
            document.documentElement.style.setProperty('--dur', (rows * 5) + 's');
            track.offsetHeight;
            track.classList.add('scrolling');
        }
    }

    // ---- MODE ----
    var isAmbient = true;
    var navArtwork = document.getElementById('nav-artwork');

    function setAmbient() {
        isAmbient = true;
        document.getElementById('grid-vp').classList.remove('browse');
        navArtwork.classList.remove('active');
        buildGrid(false);
    }
    function setBrowse() {
        isAmbient = false;
        document.getElementById('grid-vp').classList.add('browse');
        navArtwork.classList.add('active');
        buildGrid(true);
    }

    navArtwork.addEventListener('click', function(e) { e.preventDefault(); isAmbient ? setBrowse() : setAmbient(); });
    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space' && document.activeElement === document.body) { e.preventDefault(); isAmbient ? setBrowse() : setAmbient(); }
    });

    // Touch: tap to enter browse mode
    var touchHintShown = false, hintTimer;
    document.getElementById('grid-vp').addEventListener('touchstart', function() {
        if (isAmbient) {
            setBrowse();
            if (!touchHintShown) {
                touchHintShown = true;
                var hint = document.getElementById('touch-hint');
                hint.classList.add('show');
                clearTimeout(hintTimer);
                hintTimer = setTimeout(function() { hint.classList.remove('show'); }, 2000);
            }
        }
    }, { passive: true });

    // ---- MENU ----
    var pBtn = document.getElementById('pancake-btn'), pDrop = document.getElementById('pancake-drop');
    pBtn.addEventListener('click', function(e) { e.stopPropagation(); pBtn.classList.toggle('open'); pDrop.classList.toggle('open'); });
    document.addEventListener('click', function() { pBtn.classList.remove('open'); pDrop.classList.remove('open'); });

    buildGrid(false);
    </script>
</body>
</html>
