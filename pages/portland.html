    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }

        /* ---- TOP BAR ---- */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 56px; background: #000; z-index: 100;
            display: flex; align-items: center; padding: 0 18px; gap: 12px;
        }
        .nav-logo { display: block; height: 38px; width: auto; opacity: 0.9; transition: opacity 0.2s; flex-shrink: 0; }
        .nav-logo:hover { opacity: 1; }
        .pancake-wrap { position: relative; flex-shrink: 0; margin-left: auto; }
        .pancake-btn {
            background: none; border: none; cursor: pointer; padding: 4px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .pancake-btn span { display: block; width: 18px; height: 1.5px; background: rgba(255,255,255,0.85); transition: all 0.25s; }
        .pancake-btn.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
        .pancake-btn.open span:nth-child(2) { opacity: 0; }
        .pancake-btn.open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }
        .pancake-dropdown {
            display: none; position: absolute; top: calc(100% + 8px); right: 0;
            background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
            overflow: hidden; min-width: 160px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 200;
        }
        .pancake-dropdown.open { display: block; }
        .pancake-dropdown a { display: block; padding: 13px 20px; font-size: 0.9rem; color: #ccc; text-decoration: none; border-bottom: 1px solid #222; transition: background 0.15s, color 0.15s; }
        .pancake-dropdown a:last-child { border-bottom: none; }
        .pancake-dropdown a:hover { background: #222; color: #fff; }
        .pancake-dropdown a.join { font-weight: 600; color: #fff; }
        .nav-city { font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif; font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.85); text-decoration: none; letter-spacing: 0.03em; transition: opacity 0.2s; }
        .nav-city:hover { opacity: 0.7; }

        /* ---- GRID ---- */
        .grid-viewport {
            position: fixed; top: 56px; left: 0; right: 0; bottom: 56px;
            overflow: hidden; cursor: pointer;
        }
        .grid-viewport.frozen { cursor: default; }
        .grid-track {
            position: absolute; top: 0; left: 0; right: 0;
            display: grid; gap: var(--gap); padding: var(--gap);
            will-change: transform;
        }
        .grid-track.scrolling { animation: scrollUp var(--dur) linear infinite; }
        @keyframes scrollUp { from { transform: translateY(0); } to { transform: translateY(var(--dist)); } }

        /* Artwork cells */
        .grid-cell { overflow: hidden; border-radius: 6px; background: #111; }
        .grid-cell img { width: 100%; height: 100%; object-fit: cover; object-position: center 35%; display: block; }
        .grid-cell.tall { grid-row: span 2; }
        .grid-cell.clickable { cursor: pointer; }
        .grid-cell.clickable img { transition: transform 0.3s; }
        .grid-cell.clickable:hover img { transform: scale(1.04); }

        /* Logo cell: 2-col × 2-row */
        .logo-cell {
            grid-column: span 2; grid-row: span 2;
            background: #0a0a0a; border-radius: 6px;
            overflow: hidden; position: relative;
            display: block; text-decoration: none; cursor: pointer;
        }
        .logo-cell-art {
            position: absolute; inset: 0; overflow: hidden;
            -webkit-mask-image: url('../images/arthere-mask.png');
            mask-image: url('../images/arthere-mask.png');
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            -webkit-mask-position: 21% center; mask-position: 21% center;
            -webkit-mask-size: 90% auto; mask-size: 90% auto;
        }
        .logo-cell-art-bg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center 35%;
            transition: transform 0.4s ease;
        }
        .logo-cell:hover .logo-cell-art-bg { transform: scale(1.04); }
        .logo-city-overlay {
            position: absolute; inset: 0;
            background-image: url('../images/arthere-portland-overlay.png');
            background-repeat: no-repeat;
            background-position: 21% center;
            background-size: 90% auto;
            pointer-events: none;
        }
        .logo-artist-name {
            position: absolute; bottom: 12px; left: 14px;
            font-family: 'Inter', -apple-system, sans-serif;
            font-weight: 300; font-style: italic;
            font-size: calc(var(--row-px) * 0.055);
            color: rgba(255,255,255,0.75);
            letter-spacing: 0.01em; line-height: 1;
            pointer-events: none;
        }

        /* ---- RESUME BUTTON ---- */
        .resume-btn {
            position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.65); border-radius: 20px; padding: 7px 18px;
            font-size: 0.75rem; font-family: 'Inter', sans-serif; letter-spacing: 0.06em;
            cursor: pointer; transition: all 0.2s; z-index: 90;
            opacity: 0; pointer-events: none;
        }
        .resume-btn.visible { opacity: 1; pointer-events: auto; }
        .resume-btn:hover { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.35); }

        /* ---- BOTTOM BAR ---- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100;
            display: flex; align-items: center; padding: 0 18px; gap: 28px;
        }
        .bottom-bar-city {
            font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
            font-size: 0.95rem; font-weight: 700; color: #fff;
            letter-spacing: 0.03em; flex-shrink: 0;
        }
        .bottom-bar-divider { color: #444; margin: 0 14px; font-size: 0.9rem; flex-shrink: 0; }
        .bottom-bar a {
            color: rgba(255,255,255,0.55); text-decoration: none;
            font-size: 0.88rem; font-weight: 500; letter-spacing: 0.04em;
            transition: color 0.2s; padding: 4px 0; border-bottom: 1.5px solid transparent;
        }
        .bottom-bar a:hover, .bottom-bar a.active { color: #fff; border-color: rgba(255,255,255,0.6); }

        @media (max-width: 600px) {
            .bottom-bar-city, .bottom-bar-divider { display: none; }
            .bottom-bar { justify-content: center; }
        }

        /* ---- CITIES SUBMENU ---- */
        .pancake-dropdown .cities-item { position: relative; }
        .pancake-dropdown .cities-trigger {
            display: flex; justify-content: space-between; align-items: center;
            padding: 13px 20px; font-size: 0.9rem; color: #ccc; cursor: pointer;
            border-bottom: 1px solid #222; transition: background 0.15s;
            background: none; border-left: none; border-right: none; border-top: none;
            width: 100%; text-align: left; font-family: 'Inter', -apple-system, sans-serif;
        }
        .pancake-dropdown .cities-trigger:hover { background: #222; color: #fff; }
        .pancake-dropdown .cities-arrow { font-size: 0.65rem; color: #555; transition: transform 0.2s; }
        .pancake-dropdown .cities-trigger.open .cities-arrow { transform: rotate(90deg); }
        .cities-submenu { display: none; background: #111; border-bottom: 1px solid #222; }
        .cities-submenu.open { display: block; }
        .cities-submenu a, .cities-submenu span {
            display: flex; align-items: baseline; gap: 8px;
            padding: 9px 20px 9px 28px; font-size: 0.85rem;
            text-decoration: none; transition: background 0.15s;
        }
        .cities-submenu a { color: #ccc; }
        .cities-submenu span { color: #333; cursor: default; }
        .cities-submenu a:hover { background: #1a1a1a; color: #fff; }
    </style>

    // Derive display name from artist URL slug, with overrides for edge cases
    var NAME_OVERRIDES = {
        'f-lauren-carrera':   'F. Lauren Carrera',
        'hsin-yi-huang':      'Hsin-Yi Huang',
        'mary-t-lee':         'Mary T. Lee',
        'todd-j-elliott':     'Todd J. Elliott',
    };
    function nameFromUrl(url) {
        var slug = url.replace('../artists/', '').replace('.html', '');
        if (NAME_OVERRIDES[slug]) return NAME_OVERRIDES[slug];
        return slug.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
    }

    function shuffle(a) {
        var arr = a.slice();
        for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
        }
        return arr;
    }

    // Round-robin: each pass picks ONE random image per artist (avoiding recent 5 rows),
    // shuffles artist order, repeats 3× so the grid is long enough to scroll.
    var SPREAD = COLS * 5;
    function buildSequence(artists) {
        var repeats = artists.length < 10 ? 1 : 3;
        var seq = [], recent = [];
        for (var r = 0; r < repeats; r++) {
            var order = shuffle(artists);
            order.forEach(function(artist) {
                var imgs = artist.images;
                var candidates = imgs.filter(function(im) { return recent.indexOf(im.src) === -1; });
                if (candidates.length === 0) candidates = imgs;
                var img = candidates[Math.floor(Math.random() * candidates.length)];
                seq.push({ src: img.src, tall: img.tall, url: artist.url, name: nameFromUrl(artist.url) });
                recent.push(img.src);
                if (recent.length > SPREAD) recent.shift();
            });
        }
        return seq;
    }

    function makeLogoCell(seqItem) {
        var cell = document.createElement('a');
        cell.className = 'logo-cell';
        cell.href = seqItem.url;
        cell.style.setProperty('--row-px', ROW + 'px');
        cell.style.height = (ROW * 2 + GAP) + 'px';
        var artDiv = document.createElement('div');
        artDiv.className = 'logo-cell-art';
        var artBg = document.createElement('div');
        artBg.className = 'logo-cell-art-bg';
        artBg.style.backgroundImage = 'url(' + seqItem.src + ')';
        artDiv.appendChild(artBg);
        cell.appendChild(artDiv);
        var overlayDiv = document.createElement('div');
        overlayDiv.className = 'logo-city-overlay';
        cell.appendChild(overlayDiv);
        var nameEl = document.createElement('div');
        nameEl.className = 'logo-artist-name';
        nameEl.textContent = 'Artwork above by ' + seqItem.name;
        cell.appendChild(nameEl);
        return cell;
    }

    function makeCell(art) {
        var c = document.createElement('div');
        c.className = 'grid-cell' + (art.tall ? ' tall' : '');
        c.style.height = (art.tall ? ROW * 2 + GAP : ROW) + 'px';
        if (art.tall) c.style.gridRow = 'span 2';
        c.setAttribute('data-url', art.url);
        var img = document.createElement('img');
        img.src = art.src; img.alt = ''; img.loading = 'lazy';
        c.appendChild(img);
        return c;
    }

    function buildGrid() {
        frozen = false;
        vp.classList.remove('frozen');
        resumeBtn.classList.remove('visible');
        vp.style.overflowY = '';   // restore CSS overflow: hidden
        vp.scrollTop = 0;

        var track = document.getElementById('grid-track');
        track.innerHTML = '';
        track.style.transform = '';
        track.style.position = '';  // restore CSS position: absolute
        track.style.width = '';
        track.classList.remove('scrolling');

        var seq = buildSequence(ARTISTS);
        track.appendChild(makeLogoCell(seq[0]));

        var imgIdx = 1, lastWasTall = false;
        while (imgIdx < seq.length) {
            var art = seq[imgIdx++];
            var useTall = art.tall && !lastWasTall;
            lastWasTall = useTall;
            track.appendChild(makeCell({src: art.src, url: art.url, tall: useTall}));
        }

        var totalRows = 2 + Math.ceil((seq.length - 1) / COLS);
        var dist = totalRows * (ROW + GAP);
        document.documentElement.style.setProperty('--dist', '-' + dist + 'px');
        document.documentElement.style.setProperty('--dur', (totalRows * 5) + 's');
        track.offsetHeight; // force reflow before adding class
        track.classList.add('scrolling');
    }

    // Freeze: capture mid-animation Y, stop scrolling, switch to native scroll
    function freeze() {
        if (frozen) return;
        frozen = true;

        var track = document.getElementById('grid-track');
        var style = window.getComputedStyle(track);
        var matrix = style.transform || style.webkitTransform;
        var currentY = 0;
        if (matrix && matrix !== 'none') {
            var match = matrix.match(/matrix.*\((.+)\)/);
            if (match) { var vals = match[1].split(', '); currentY = parseFloat(vals[5]) || 0; }
        }

        // Stop the CSS animation and convert the Y offset to scrollTop
        track.classList.remove('scrolling');
        track.style.transform = 'none';
        track.style.position = 'relative';
        track.style.width = '100%';
        vp.style.overflowY = 'auto';
        vp.scrollTop = Math.max(0, -currentY);

        track.querySelectorAll('.grid-cell[data-url]').forEach(function(cell) {
            cell.classList.add('clickable');
            cell.addEventListener('click', function(e) {
                e.stopPropagation();
                window.location.href = cell.getAttribute('data-url');
            }, { once: true });
        });

        vp.classList.add('frozen');
        resumeBtn.classList.add('visible');
    }

    // Resume: rebuild with fresh shuffle and restart animation
    function resume() {
        if (!frozen) return;
        recalcDims();
        buildGrid();
    }

    var vp = document.getElementById('grid-vp');
    var resumeBtn = document.getElementById('resume-btn');

    // Click/tap grid to freeze; individual cell clicks navigate (stop propagation)
    vp.addEventListener('click', function() { if (!frozen) freeze(); });
    vp.addEventListener('touchstart', function() { if (!frozen) freeze(); }, { passive: true });

    // Resume button
    resumeBtn.addEventListener('click', function(e) { e.stopPropagation(); resume(); });

    // Keyboard: space freezes/resumes, Escape resumes
    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space') { e.preventDefault(); frozen ? resume() : freeze(); }
        if (e.code === 'Escape') { resume(); }
    });

    // Menu
    var pBtn = document.getElementById('pancake-btn'), pDrop = document.getElementById('pancake-drop');
    pBtn.addEventListener('click', function(e) { e.stopPropagation(); pBtn.classList.toggle('open'); pDrop.classList.toggle('open'); });
    var citiesTrigger = document.getElementById('cities-trigger');
    var citiesSubmenu = document.getElementById('cities-submenu');
    if (citiesTrigger) {
        citiesTrigger.addEventListener('click', function(e) {
            e.stopPropagation();
            citiesTrigger.classList.toggle('open');
            citiesSubmenu.classList.toggle('open');
        });
    }
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.pancake-wrap')) {
            pBtn.classList.remove('open'); pDrop.classList.remove('open');
            if (citiesSubmenu) { citiesSubmenu.classList.remove('open'); if (citiesTrigger) citiesTrigger.classList.remove('open'); }
        }
    });

    // Rebuild on resize (debounced)
    var resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() { recalcDims(); buildGrid(); }, 150);
    });

    buildGrid();
    </script>
