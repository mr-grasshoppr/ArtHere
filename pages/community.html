<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portland Community - Art Here</title>
    <link rel="icon" type="image/png" href="../images/ArtHere_favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; color: #1a1a1a; background: #fff; padding-top: 56px; padding-bottom: 56px; }

        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: rgba(255,255,255,0.97); backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee; z-index: 200;
            display: flex; align-items: center; padding: 0 18px; gap: 12px;
        }
        .nav-logo { display: block; height: 38px; width: auto; transition: opacity 0.2s; }
        .nav-logo:hover { opacity: 0.7; }
        .pancake-wrap { position: relative; margin-left: auto; }
        .pancake-btn {
            background: none; border: none; cursor: pointer; padding: 4px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .pancake-btn span { display: block; width: 20px; height: 1.5px; background: #1a1a1a; transition: all 0.25s; }
        .pancake-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
        .pancake-btn.open span:nth-child(2) { opacity: 0; }
        .pancake-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
        .pancake-dropdown {
            display: none; position: absolute; top: calc(100% + 8px); right: 0;
            background: #fff; border: 1px solid #eee; border-radius: 6px;
            overflow: hidden; min-width: 160px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 300;
        }
        .pancake-dropdown.open { display: block; }
        .pancake-dropdown a { display: block; padding: 13px 20px; font-size: 0.9rem; color: #444; text-decoration: none; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
        .pancake-dropdown a:last-child { border-bottom: none; }
        .pancake-dropdown a:hover { background: #fafafa; color: #1a1a1a; }
        .pancake-dropdown a.join { font-weight: 600; color: #1a1a1a; }
        .nav-city { font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; color: #1a1a1a; text-decoration: none; letter-spacing: 0.03em; transition: opacity 0.2s; }
        .nav-city:hover { opacity: 0.6; }

        /* ---- FILTER BAR ---- */
        .filter-bar {
            position: sticky; top: 56px;
            background: rgba(255,255,255,0.97); backdrop-filter: blur(8px);
            z-index: 50;
            max-width: 1400px; margin: 0 auto;
            padding: 16px 40px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }
        .filter-wrap { position: relative; }
        .filter-btn {
            padding: 5px 14px; border: 0.5px solid #ccc; border-radius: 20px;
            background: transparent; font-size: 0.78rem; color: #888; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: all 0.2s; white-space: nowrap;
        }
        .filter-btn:hover { border-color: #999; color: #444; }
        .filter-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
        .filter-dropdown {
            display: none; position: absolute; top: calc(100% + 6px); left: 0;
            background: #fff; border: 1px solid #eee; border-radius: 6px;
            overflow: hidden; min-width: 200px; z-index: 200;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .filter-dropdown.open { display: block; }
        .filter-dropdown button {
            display: block; width: 100%; padding: 10px 16px; text-align: left;
            background: none; border: none; border-bottom: 1px solid #f0f0f0;
            color: #888; font-size: 0.82rem; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: background 0.15s, color 0.15s;
        }
        .filter-dropdown button:last-child { border-bottom: none; }
        .filter-dropdown button:hover { background: #fafafa; color: #1a1a1a; }
        .filter-dropdown button.chosen { color: #1a1a1a; font-weight: 500; }
        @media (max-width: 600px) { .filter-bar { padding: 12px 20px; } }

        .page-header { padding: 48px 40px 32px; max-width: 1400px; margin: 0 auto; border-bottom: 1px solid #f0f0f0; }
        .page-header h1 { font-family: 'Nunito', sans-serif; font-size: 2rem; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 6px; }
        .page-header p { font-size: 0.95rem; color: #888; font-weight: 300; }

        /* Section labels (shown when both events + places are visible) */
        .section-label { max-width: 1400px; margin: 0 auto; padding: 40px 40px 0; }
        .section-label h2 {
            font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 700;
            color: #1a1a1a; letter-spacing: 0.01em;
        }

        /* Events grid (JS-populated, mirrors places-grid layout) */
        #events-grid {
            max-width: 1400px; margin: 0 auto; padding: 24px 40px 0;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;
        }

        /* Places grid */
        .places-grid {
            max-width: 1400px; margin: 0 auto; padding: 40px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;
        }
        .place-card { text-decoration: none; color: inherit; display: block; border-radius: 8px; overflow: hidden; border: 1px solid #f0f0f0; transition: box-shadow 0.2s, transform 0.2s; }
        .place-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .place-image { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #f4f4f0; }
        .place-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .place-info { padding: 16px 18px; }
        .place-name { font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
        .place-meta { font-size: 0.82rem; color: #888; font-weight: 300; }

        /* Date badge on event card images */
        .event-date-badge {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.72); color: #fff;
            padding: 4px 9px; border-radius: 4px;
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em;
            text-transform: uppercase; pointer-events: none;
        }

        @media (max-width: 600px) {
            .places-grid { grid-template-columns: 1fr; padding: 20px; }
            #events-grid { grid-template-columns: 1fr; padding: 16px 20px 0; }
            .section-label { padding: 32px 20px 0; }
            .page-header { padding: 32px 20px 24px; }
        }

        /* ---- BOTTOM BAR ---- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(8px);
            border-top: 1px solid #111; z-index: 100;
            display: flex; align-items: center; padding: 0 18px; gap: 0;
        }
        .bottom-bar-city {
            font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
            font-size: 0.95rem; font-weight: 700; color: #fff;
            letter-spacing: 0.03em; flex-shrink: 0;
        }
        .bottom-bar-divider { color: #444; margin: 0 14px; flex-shrink: 0; }
        .bottom-bar-links { display: flex; gap: 24px; align-items: center; }
        .bottom-bar-links a {
            color: rgba(255,255,255,0.45); text-decoration: none; font-size: 0.88rem;
            font-weight: 500; letter-spacing: 0.03em;
            transition: color 0.2s; padding: 4px 0;
            border-bottom: 1.5px solid transparent;
        }
        .bottom-bar-links a:hover { color: #fff; }
        .bottom-bar-links a.active { color: #fff; border-color: rgba(255,255,255,0.6); }

        @media (max-width: 600px) {
            .bottom-bar-city, .bottom-bar-divider { display: none; }
            .bottom-bar { justify-content: center; }
            .bottom-bar-links { gap: 20px; }
        }

        /* ---- CITIES SUBMENU ---- */
        .pancake-dropdown .cities-item { position: relative; }
        .pancake-dropdown .cities-trigger {
            display: flex; justify-content: space-between; align-items: center;
            padding: 13px 20px; font-size: 0.9rem; color: #444; cursor: pointer;
            border-bottom: 1px solid #f0f0f0; transition: background 0.15s;
            background: none; border-left: none; border-right: none; border-top: none;
            width: 100%; text-align: left; font-family: 'Inter', -apple-system, sans-serif;
        }
        .pancake-dropdown .cities-trigger:hover { background: #fafafa; color: #1a1a1a; }
        .pancake-dropdown .cities-arrow { font-size: 0.65rem; color: #ccc; transition: transform 0.2s; }
        .pancake-dropdown .cities-trigger.open .cities-arrow { transform: rotate(90deg); }
        .cities-submenu { display: none; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
        .cities-submenu.open { display: block; }
        .cities-submenu a, .cities-submenu span {
            display: flex; align-items: baseline; gap: 8px;
            padding: 9px 20px 9px 28px; font-size: 0.85rem;
            text-decoration: none; transition: background 0.15s;
        }
        .cities-submenu a { color: #1a1a1a; }
        .cities-submenu span { color: #ccc; cursor: default; }
        .cities-submenu a:hover { background: #f0f0f0; color: #1a1a1a; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html"><img src="../images/arthere-logo-dark.png" alt="Art Here" class="nav-logo"></a>
        <div class="pancake-wrap">
            <button class="pancake-btn" id="pancake-btn">
                <span></span><span></span><span></span>
            </button>
            <div class="pancake-dropdown" id="pancake-drop">
                <a href="survey.html" class="join">Join Us</a>
                <div class="cities-item">
                    <button class="cities-trigger" id="cities-trigger">Cities <span class="cities-arrow">&#9654;</span></button>
                    <div class="cities-submenu" id="cities-submenu">
                        <a href="portland.html">Portland, OR</a>
                        <span>Biloxi, MS</span>
                        <span>San Jose, CA</span>
                    </div>
                </div>
                <a href="about.html">About</a>
                <a href="about.html#contact">Contact</a>
            </div>
        </div>
        <a href="portland.html" class="nav-city">Portland, OR</a>
    </div>

    <div class="page-header">
        <h1>Portland Community</h1>
        <p>The places and people that support our community's artists.</p>
    </div>

    <!-- Place filter bar -->
    <div class="filter-bar" id="place-filter-bar">
        <button class="filter-btn active" id="place-filter-all">All</button>
        <div class="filter-wrap">
            <button class="filter-btn" id="place-filter-btn">Place ▾</button>
            <div class="filter-dropdown" id="place-filter-drop">
                <!-- populated from js/places.js -->
            </div>
        </div>
    </div>

    <!-- Events section — shown only when upcoming events exist -->
    <div id="events-section" style="display:none;">
        <div class="section-label"><h2>Upcoming Events</h2></div>
        <div id="events-grid"></div>
    </div>

    <!-- Places label — shown alongside events so sections are distinct -->
    <div id="places-label" class="section-label" style="display:none;">
        <h2>Community Places</h2>
    </div>

    <!-- Place cards rendered by JS from places.js -->
    <div class="places-grid" id="places-grid"></div>

    <div style="max-width:1400px; margin:0 auto; padding: 24px 40px 8px;">
        <a href="portland.html" style="color:#aaa; font-size:0.88rem; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#1a1a1a'" onmouseout="this.style.color='#aaa'">&larr; back to Portland</a>
    </div>

    <script src="../js/places.js"></script>
    <script>
    // ── PLACE CARDS — rendered from js/places.js ─────────────────────────────
    var activePlaceFilter = '';
    var placesGrid = document.getElementById('places-grid');

    function renderPlaceCards() {
        placesGrid.innerHTML = '';
        PLACES.forEach(function(p) {
            if (activePlaceFilter && activePlaceFilter !== p.id) return;
            var card = document.createElement('a');
            card.href = p.url;
            card.className = 'place-card';

            var imgWrap = document.createElement('div');
            imgWrap.className = 'place-image';
            if (p.image) {
                var img = document.createElement('img');
                img.src = p.image; img.alt = p.name;
                imgWrap.appendChild(img);
            } else {
                imgWrap.style.cssText = 'background:#f0ede8; display:flex; align-items:center; justify-content:center;';
                var fallback = document.createElement('span');
                fallback.style.cssText = "font-family:'Nunito',sans-serif; font-size:0.9rem; color:#999;";
                fallback.textContent = p.name;
                imgWrap.appendChild(fallback);
            }
            card.appendChild(imgWrap);

            var info = document.createElement('div');
            info.className = 'place-info';
            var nameEl = document.createElement('div');
            nameEl.className = 'place-name';
            nameEl.textContent = p.name;
            var metaEl = document.createElement('div');
            metaEl.className = 'place-meta';
            metaEl.innerHTML = p.meta;
            info.appendChild(nameEl);
            info.appendChild(metaEl);
            card.appendChild(info);
            placesGrid.appendChild(card);
        });
    }

    // Build Place filter dropdown from PLACES
    (function() {
        var drop = document.getElementById('place-filter-drop');
        var clearBtn = document.createElement('button');
        clearBtn.dataset.place = ''; clearBtn.textContent = 'All places';
        drop.appendChild(clearBtn);
        PLACES.forEach(function(p) {
            var btn = document.createElement('button');
            btn.dataset.place = p.id; btn.textContent = p.name;
            drop.appendChild(btn);
        });
    })();

    var placeFilterAllBtn = document.getElementById('place-filter-all');
    var placeFilterBtn    = document.getElementById('place-filter-btn');
    var placeFilterDrop   = document.getElementById('place-filter-drop');

    placeFilterAllBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        activePlaceFilter = '';
        placeFilterBtn.textContent = 'Place ▾';
        placeFilterBtn.classList.remove('active');
        placeFilterAllBtn.classList.add('active');
        placeFilterDrop.querySelectorAll('button').forEach(function(x) { x.classList.remove('chosen'); });
        renderPlaceCards();
    });

    placeFilterBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        placeFilterDrop.classList.toggle('open');
    });

    placeFilterDrop.addEventListener('click', function(e) {
        var b = e.target.closest('button');
        if (!b) return;
        e.stopPropagation();
        activePlaceFilter = b.dataset.place;
        placeFilterBtn.textContent = activePlaceFilter ? b.textContent + ' ▾' : 'Place ▾';
        placeFilterBtn.classList.toggle('active', !!activePlaceFilter);
        placeFilterAllBtn.classList.toggle('active', !activePlaceFilter);
        placeFilterDrop.querySelectorAll('button').forEach(function(x) { x.classList.remove('chosen'); });
        if (activePlaceFilter) b.classList.add('chosen');
        placeFilterDrop.classList.remove('open');
        renderPlaceCards();
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.filter-wrap')) placeFilterDrop.classList.remove('open');
    });

    renderPlaceCards();

    // ── EVENTS ───────────────────────────────────────────────────────────────
    // Add events here. They disappear automatically after their date passes.
    // date format: "YYYY-MM-DD"
    var EVENTS = [
        // Add events here. They disappear automatically after their date passes.
        // Example entry:
        // {
        //     title: "Event Title",
        //     venue: "Venue Name",
        //     date: "2026-09-01",      // YYYY-MM-DD — required
        //     time: "6:00 – 9:00 PM", // optional
        //     url: "../artists/artist-name.html", // optional — makes card clickable
        //     image: "../images/artwork/image.jpg" // optional
        // }
    ];

    // Parse "YYYY-MM-DD" as local date (avoids UTC timezone offset issues)
    function parseLocalDate(str) {
        var p = str.split('-');
        return new Date(+p[0], +p[1] - 1, +p[2]);
    }

    // "2026-06-14" → "Jun 14"
    function formatDate(str) {
        return parseLocalDate(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function renderEvents() {
        var today = new Date();
        today.setHours(0, 0, 0, 0);

        // Keep only future events, sorted soonest first
        var upcoming = EVENTS.filter(function(e) {
            return parseLocalDate(e.date) >= today;
        }).sort(function(a, b) {
            return parseLocalDate(a.date) - parseLocalDate(b.date);
        });

        var section = document.getElementById('events-section');
        var placesLabel = document.getElementById('places-label');

        if (upcoming.length === 0) return; // nothing to show — section stays hidden

        var grid = document.getElementById('events-grid');
        upcoming.forEach(function(e) {
            // Card element: <a> if there's a URL, <div> otherwise
            var card = document.createElement(e.url ? 'a' : 'div');
            card.className = 'place-card';
            if (e.url) card.href = e.url;

            // Image area + date badge
            var imgWrap = document.createElement('div');
            imgWrap.className = 'place-image';

            if (e.image) {
                var img = document.createElement('img');
                img.src = e.image;
                img.alt = e.title;
                imgWrap.appendChild(img);
            } else {
                imgWrap.style.cssText = 'background:#f0ede8; display:flex; align-items:center; justify-content:center;';
                var fallback = document.createElement('span');
                fallback.style.cssText = "font-family:'Nunito',sans-serif; font-size:0.9rem; color:#999;";
                fallback.textContent = e.venue;
                imgWrap.appendChild(fallback);
            }

            var badge = document.createElement('div');
            badge.className = 'event-date-badge';
            badge.textContent = formatDate(e.date);
            imgWrap.appendChild(badge);

            card.appendChild(imgWrap);

            // Info area
            var info = document.createElement('div');
            info.className = 'place-info';

            var name = document.createElement('div');
            name.className = 'place-name';
            name.textContent = e.title;

            var meta = document.createElement('div');
            meta.className = 'place-meta';
            meta.textContent = e.venue + (e.time ? ' · ' + e.time : '');

            info.appendChild(name);
            info.appendChild(meta);
            card.appendChild(info);
            grid.appendChild(card);
        });

        section.style.display = '';
        placesLabel.style.display = '';
    }

    renderEvents();

    // ── MENU ─────────────────────────────────────────────────────────────────
    var btn = document.getElementById('pancake-btn'), drop = document.getElementById('pancake-drop');
    btn.addEventListener('click', function(e) { e.stopPropagation(); btn.classList.toggle('open'); drop.classList.toggle('open'); });

    var citiesTrigger = document.getElementById('cities-trigger');
    var citiesSubmenu = document.getElementById('cities-submenu');
    if (citiesTrigger) {
        citiesTrigger.addEventListener('click', function(e) {
            e.stopPropagation();
            citiesTrigger.classList.toggle('open');
            citiesSubmenu.classList.toggle('open');
        });
    }
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.pancake-wrap')) {
            btn.classList.remove('open'); drop.classList.remove('open');
            if (citiesSubmenu) { citiesSubmenu.classList.remove('open'); citiesTrigger.classList.remove('open'); }
        }
    });
    </script>

    <nav class="bottom-bar">
        <a href="portland.html" class="bottom-bar-city">Portland, OR</a>
        <span class="bottom-bar-divider">|</span>
        <div class="bottom-bar-links">
            <a href="artwork.html">artwork</a>
            <a href="artists.html">artists</a>
            <a href="community.html" class="active">community</a>
            <a href="network.html">network</a>
        </div>
    </nav>
</body>
</html>
