<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Here</title>
    <link rel="icon" type="image/png" href="images/ArtHere_favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ---- PANCAKE NAV (top-left) ---- */
        .top-nav {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 100;
            padding: 22px 28px;
            display: flex;
            align-items: center;
        }
        .pancake-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .pancake-btn span {
            display: block;
            width: 22px;
            height: 1.5px;
            background: #1a1a1a;
            transition: all 0.25s;
        }
        .pancake-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
        .pancake-btn.open span:nth-child(2) { opacity: 0; }
        .pancake-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
        .pancake-menu {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 280px;
            height: 100vh;
            background: #fff;
            border-right: 1px solid #eee;
            box-shadow: 4px 0 24px rgba(0,0,0,0.06);
            z-index: 99;
            padding: 80px 0 40px;
            flex-direction: column;
        }
        .pancake-menu.open { display: flex; }
        .pancake-menu a {
            display: block;
            padding: 16px 36px;
            font-size: 1.05rem;
            color: #1a1a1a;
            text-decoration: none;
            transition: color 0.2s, background 0.2s;
            border-bottom: 1px solid #f5f5f5;
        }
        .pancake-menu a:hover { background: #fafafa; }
        .pancake-menu a.join { font-weight: 600; }
        .pancake-menu .menu-label {
            padding: 24px 36px 8px;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: #bbb;
        }
        .menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            z-index: 98;
        }
        .menu-overlay.open { display: block; }

        /* ---- LOGO WINDOW ---- */
        .logo-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            min-height: 70vh;
        }
        .logo-mask {
            position: relative;
            width: min(85vw, 700px);
            aspect-ratio: 1671 / 1460;
            overflow: hidden;
            -webkit-mask-image: url('images/arthere-mask.png');
            mask-image: url('images/arthere-mask.png');
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: contain;
            mask-size: contain;
        }
        .image-track {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            display: flex;
            animation: slide 50s linear infinite;
        }
        .image-track .slide { height: 100%; flex-shrink: 0; }
        .image-track .slide img { height: 100%; width: auto; object-fit: cover; display: block; }
        @keyframes slide {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ---- CITIES LIST ---- */
        .cities-list {
            position: fixed;
            top: 28px;
            left: 28px;
            margin-top: 52px;
            z-index: 10;
        }
        .city-link {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 5px 0;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .city-link:hover .city-name { color: #1a1a1a; }
        .city-link:hover .city-arrow { opacity: 1; transform: translateX(3px); }
        .city-name {
            font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a1a1a;
            transition: color 0.2s;
        }
        .city-name.soon { color: #ccc; }
        .city-tag {
            font-size: 0.7rem;
            color: #bbb;
            font-weight: 300;
            letter-spacing: 0.05em;
        }
        .city-arrow {
            color: #aaa;
            font-size: 1rem;
            opacity: 0;
            transition: all 0.2s;
        }

        footer {
            padding: 32px 28px;
            text-align: center;
            color: #bbb;
            font-size: 0.78rem;
            letter-spacing: 0.05em;
        }

        @media (max-width: 600px) {
            .logo-mask { width: 88vw; }
            .city-name { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- PANCAKE NAV -->
    <div class="top-nav">
        <button class="pancake-btn" id="pancake-btn" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </div>

    <!-- CITIES (fixed top-left under pancake) -->
    <div class="cities-list">
        <a href="pages/portland.html" class="city-link">
            <span class="city-name">Portland</span>
            <span class="city-arrow">→</span>
        </a>
        <a href="#" class="city-link" style="cursor:default;">
            <span class="city-name soon">Biloxi</span>
            <span class="city-tag">coming soon</span>
        </a>
        <a href="#" class="city-link" style="cursor:default;">
            <span class="city-name soon">San Jose</span>
            <span class="city-tag">coming soon</span>
        </a>
    </div>

    <div class="menu-overlay" id="menu-overlay"></div>
    <nav class="pancake-menu" id="pancake-menu">
        <a href="pages/survey.html" class="join">Join Us</a>
        <a href="pages/about.html">About</a>
        <a href="pages/about.html#contact">Contact</a>
    </nav>

    <!-- LOGO -->
    <div class="logo-window">
        <div class="logo-mask">
            <div class="image-track">
                <div class="slide"><img src="images/bg-art1.png" alt=""></div>
                <div class="slide"><img src="images/bg-art2.jpg" alt=""></div>
                <div class="slide"><img src="images/bg-art1.png" alt=""></div>
                <div class="slide"><img src="images/bg-art2.jpg" alt=""></div>
            </div>
        </div>

        <!-- CITIES -->
        </div>

    <footer>&copy; 2026 Art Here &middot; A project of Art Experience Lab</footer>

    <script>
    var btn = document.getElementById('pancake-btn');
    var menu = document.getElementById('pancake-menu');
    var overlay = document.getElementById('menu-overlay');
    function toggleMenu() {
        btn.classList.toggle('open');
        menu.classList.toggle('open');
        overlay.classList.toggle('open');
    }
    btn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
