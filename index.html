<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Here</title>
    <link rel="icon" type="image/png" href="images/ArtHere_favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---- PANCAKE NAV ---- */
        .top-nav {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 100;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-logo {
            display: block;
            height: 26px; width: auto;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .nav-logo:hover { opacity: 0.6; }
        .pancake-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .pancake-btn span {
            display: block;
            width: 22px;
            height: 1.5px;
            background: #1a1a1a;
            transition: all 0.25s;
        }
        .pancake-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
        .pancake-btn.open span:nth-child(2) { opacity: 0; }
        .pancake-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
        .pancake-menu {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: #fff;
            border: 1px solid #eee;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            min-width: 160px;
            border-radius: 6px;
            overflow: hidden;
            z-index: 200;
        }
        .pancake-menu.open { display: block; }
        .pancake-menu a {
            display: block;
            padding: 13px 20px;
            font-size: 0.92rem;
            color: #444;
            text-decoration: none;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.15s, color 0.15s;
        }
        .pancake-menu a:last-child { border-bottom: none; }
        .pancake-menu a:hover { background: #fafafa; color: #1a1a1a; }

        /* ---- LOGO + CITIES ---- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            min-height: 80vh;
        }

        .logo-mask {
            position: relative;
            width: min(60vw, 520px);
            aspect-ratio: 1668 / 1457;
            overflow: hidden;
            -webkit-mask-image: url('images/arthere-mask.png');
            mask-image: url('images/arthere-mask.png');
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
        }
        .image-track {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            display: flex;
            animation: slide 50s linear infinite;
        }
        .image-track .slide { height: 100%; flex-shrink: 0; }
        .image-track .slide img { height: 100%; width: auto; min-width: 100%; object-fit: cover; display: block; }
        @keyframes slide {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ---- CITIES ---- */
        .cities-list {
            margin-top: 36px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        .city-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        .city-name {
            font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ccc;
        }
        .city-tag {
            font-size: 0.7rem;
            color: #bbb;
            font-weight: 300;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        footer {
            padding: 32px 28px;
            text-align: center;
            color: #bbb;
            font-size: 0.78rem;
            letter-spacing: 0.05em;
        }

        @media (max-width: 600px) {
            .logo-mask { width: min(85vw, 380px); }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="images/arthere-logo-dark.png" alt="Art Here" class="nav-logo">
        <div style="position:relative;">
            <button class="pancake-btn" id="pancake-btn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <div class="pancake-menu" id="pancake-menu">
                <a href="pages/about.html">About</a>
                <a href="pages/about.html#contact">Contact</a>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="logo-mask">
            <div class="image-track">
                <div class="slide"><img src="images/bg-art1.png" alt=""></div>
                <div class="slide"><img src="images/bg-art2.jpg" alt=""></div>
                <div class="slide"><img src="images/bg-art1.png" alt=""></div>
                <div class="slide"><img src="images/bg-art2.jpg" alt=""></div>
            </div>
        </div>

        <div class="cities-list">
            <div class="city-row">
                <span class="city-name">Portland, OR</span>
                <span class="city-tag">coming soon</span>
            </div>
            <div class="city-row">
                <span class="city-name">Biloxi, MS</span>
                <span class="city-tag">coming soon</span>
            </div>
            <div class="city-row">
                <span class="city-name">San Jose, CA</span>
                <span class="city-tag">coming soon</span>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Art Here &middot; A project of Art Experience Lab</footer>

    <script>
    var btn = document.getElementById('pancake-btn');
    var menu = document.getElementById('pancake-menu');
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        btn.classList.toggle('open');
        menu.classList.toggle('open');
    });
    document.addEventListener('click', function() {
        btn.classList.remove('open');
        menu.classList.remove('open');
    });
    </script>
</body>
</html>
