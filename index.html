<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Here</title>
    <link rel="icon" type="image/png" href="images/ArtHere_favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---- TOP BAR ---- */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 20px 28px;
            display: flex;
            justify-content: flex-end;
            gap: 24px;
            z-index: 100;
        }
        .top-bar a {
            font-size: 0.85rem;
            color: #666;
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.15s;
        }
        .top-bar a:hover { color: #1a1a1a; }

        /* ---- LOGO + CITIES ---- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            min-height: 80vh;
        }

        .logo-mask {
            position: relative;
            width: min(60vw, 520px);
            aspect-ratio: 1668 / 1457;
            overflow: hidden;
            -webkit-mask-image: url('images/arthere-mask.png');
            mask-image: url('images/arthere-mask.png');
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
        }
        .image-track {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            display: flex;
            animation: slide 50s linear infinite;
        }
        .image-track .slide { height: 100%; flex-shrink: 0; }
        .image-track .slide img { height: 100%; width: auto; min-width: 100%; object-fit: cover; display: block; }
        @keyframes slide {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ---- CITIES ---- */
        .cities-list {
            margin-top: 36px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        .city-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        .city-name {
            font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ccc;
        }
        .city-tag {
            font-size: 0.7rem;
            color: #bbb;
            font-weight: 300;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        footer {
            padding: 32px 28px;
            text-align: center;
            color: #bbb;
            font-size: 0.78rem;
            letter-spacing: 0.05em;
        }

        @media (max-width: 600px) {
            .logo-mask { width: min(85vw, 380px); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="pages/about.html">About</a>
        <a href="pages/contact.html">Contact</a>
    </div>

    <div class="main">
        <div class="logo-mask">
            <div class="image-track">
                <div class="slide"><img src="images/bg-art1.png" alt=""></div>
                <div class="slide"><img src="images/bg-art2.jpg" alt=""></div>
                <div class="slide"><img src="images/bg-art1.png" alt=""></div>
                <div class="slide"><img src="images/bg-art2.jpg" alt=""></div>
            </div>
        </div>

        <div class="cities-list">
            <div class="city-row">
                <span class="city-name">Portland, OR</span>
                <span class="city-tag">coming soon</span>
            </div>
            <div class="city-row">
                <span class="city-name">Biloxi, MS</span>
                <span class="city-tag">coming soon</span>
            </div>
            <div class="city-row">
                <span class="city-name">San Jose, CA</span>
                <span class="city-tag">coming soon</span>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Art Here &middot; A project of Art Experience Lab</footer>

</body>
</html>
