    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #1a1a1a;
            background: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .logo-window {
            position: relative;
            width: 100vw;
            height: 75vh;
            min-height: 500px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* The masked window: a wide container where only the letter shapes are visible */
        .logo-mask {
            position: relative;
            width: 90vw;
            max-width: 1400px;
            aspect-ratio: 1670 / 800;
            overflow: hidden;
            /* Mask: opaque letters = visible, transparent surround = hidden */
            -webkit-mask-image: url('images/arthere-mask.png');
            mask-image: url('images/arthere-mask.png');
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center center;
            mask-position: center center;
            -webkit-mask-size: contain;
            mask-size: contain;
        }

        /* The sliding image track INSIDE the masked element */
        .image-track {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            animation: slide 50s linear infinite;
        }

        .image-track .slide {
            height: 100%;
            flex-shrink: 0;
        }

        .image-track .slide img {
            height: 100%;
            width: auto;
            object-fit: cover;
            display: block;
        }

        @keyframes slide {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Navigation */
        nav {
            position: relative;
            width: 100%;
            padding: 30px 0 50px;
            z-index: 10;
            background: #ffffff;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 60px;
            list-style: none;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: #1a1a1a; }

        .cities-dropdown { position: relative; }

        .cities-dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: #ffffff;
            border: 1px solid #e5e5e5;
            padding: 18px 0;
            min-width: 240px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
            margin-top: 16px;
            list-style: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .dropdown-menu li { padding: 0; }

        .dropdown-menu a {
            display: block;
            padding: 10px 28px;
            color: #aaa;
            font-size: 0.92rem;
            white-space: nowrap;
            text-decoration: none;
            transition: color 0.2s, background 0.2s;
        }

        .dropdown-menu a.active { color: #1a1a1a; font-weight: 500; }
        .dropdown-menu a:hover { background: #fafafa; color: #1a1a1a; }

        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            color: #bbb;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        @media (max-width: 700px) {
            .logo-window { height: 60vh; min-height: 360px; }
            .nav-links { gap: 36px; }
            .nav-links a { font-size: 0.88rem; }
        }
    </style>
